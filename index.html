<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Artefakt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400..800&display=swap" rel="stylesheet">
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Color ─────────────────────────────── */
      --ink: #1a1a1a;
      --paper: #feffe9;        /* pale cream ground */
      --muted: #9e9a93;
      --scaffold: #d8d4cc;
      --accent: #612bbe;       /* purple — text/highlight */
      --accent-line: #7c3aed;  /* purple — borders/underlines */
      --btn: #321366;          /* deep indigo — primary buttons */
      --btn-text: #ffffff;
      --card-bg: #f6f2fc;      /* light purple — selected card / pill */
      --canvas-bg: #f7f4ed;
      --radius: 16px;
      --font: 'Syne', sans-serif;
      --sans: 'Syne', sans-serif;

      /* ── Type scale (32 / 24 / 20 / 16 / 14 / 12) ── */
      --t-h1:   32px;   /* page headline */
      --t-lg:   24px;   /* input, for/by */
      --t-word: 20px;   /* THE WORD card label */
      --t-base: 16px;   /* subtitle, buttons, nav labels */
      --t-sm:   14px;   /* hints, card names, pill */
      --t-xs:   12px;   /* card sub-labels */
    }

    html, body {
      height: 100%;
      width: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── App Shell ────────────────────────────────────── */
    #app {
      height: 100dvh;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .screen {
      display: none;
      flex-direction: column;
      height: 100%;
      width: 100%;
      position: absolute;
      top: 0; left: 0;
    }
    .screen.active { display: flex; }

    /* ── Transitions ──────────────────────────────────── */
    .screen { opacity: 0; transform: translateX(32px); transition: opacity 0.35s ease, transform 0.35s ease; }
    .screen.active { opacity: 1; transform: translateX(0); }
    .screen.exit { opacity: 0; transform: translateX(-32px); }

    /* ── Typography ───────────────────────────────────── */
    h1 { font-size: var(--t-h1); font-weight: 400; letter-spacing: -0.3px; line-height: 1.18; }
    p.sub { font-family: var(--sans); font-size: 18px; color: var(--ink); line-height: 1.4; margin-top: 10px; }

    /* ── Buttons ──────────────────────────────────────── */
    .btn-primary {
      background: var(--btn);
      color: var(--btn-text);
      border: none;
      border-radius: 100px;
      padding: 14px 32px;
      font-size: var(--t-base);
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
      letter-spacing: 0.2px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-icon { flex-shrink: 0; }
    .btn-primary:active { opacity: 0.75; }
    .btn-primary:disabled { opacity: 0.3; cursor: default; }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--scaffold);
      border-radius: 100px;
      padding: 14px 28px;
      font-size: 15px;
      font-family: var(--sans);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-ghost:hover { border-color: var(--muted); color: var(--ink); }

    /* ══════════════════════════════════════════════════
       SCREEN 1 — Intent + Trace
    ══════════════════════════════════════════════════ */
    #screen1 {
      padding: 0;
      background: var(--paper);
    }

    .s1-top {
      padding: 40px 28px 16px;
      flex-shrink: 0;
    }

    /* ── Keyword example tags ───────────────────────────── */
    .keyword-examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 32px;
    }
    .kw-tag {
      background: #ede9f8;
      border: none;
      color: var(--accent);
      font-family: var(--font);
      font-size: var(--t-base);
      border-radius: 100px;
      padding: 7px 15px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .kw-tag:active { background: #ddd6f3; }

    /* ── Trace state title ──────────────────────────────── */
    .s1-trace-title {
      display: none;
      padding: 0 28px 12px;
      flex-shrink: 0;
    }
    .s1-trace-title h2 {
      font-size: var(--t-h1);
      font-weight: 400;
      letter-spacing: -0.3px;
      line-height: 1.18;
    }
    #screen1.state-trace .s1-trace-title { display: block; }
    #screen1.state-intent .s1-trace-title { display: none; }


    .keyword-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }
    .keyword-row-input-wrap {
      flex: 1;
      background: #ffffff;
      border: 1px solid #d4d0ca;
      border-radius: 100px;
      padding: 13px 20px;
      min-width: 0;
    }
    #keyword-input {
      width: 100%;
      background: transparent;
      border: none;
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.4;
      color: var(--ink);
      outline: none;
      min-width: 0;
    }
    #keyword-input::placeholder { color: #888480; }

    #confirm-btn {
      background: var(--btn);
      color: #ffffff;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, transform 0.15s;
    }
    #confirm-btn:disabled { opacity: 0.4; cursor: default; }
    #confirm-btn:not(:disabled):active { opacity: 0.8; transform: scale(0.94); }
    #confirm-btn:focus { outline: none; }
    #confirm-btn:disabled { opacity: 0.25; cursor: default; }
    #confirm-btn:not(:disabled):active { transform: scale(0.88); }

    /* Canvas area */
    .canvas-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 0 16px 16px;
      border-radius: var(--radius);
      background: var(--canvas-bg);
      border: 1px solid var(--accent-line);
    }

    .canvas-area.hidden { opacity: 0; pointer-events: none; }
    .canvas-area.visible { opacity: 1; animation: fadeInUp 0.4s ease; }

    /* Pinch-zoom layer — holds the scaffold image + drawing canvas together */
    .zoom-layer {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
      will-change: transform;
    }
    .zoom-layer.snapping { transition: transform 0.2s ease-out; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* AI scaffold image — sits behind the drawing canvas */
    #scaffold-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
      z-index: 0;
    }
    #scaffold-img.ready { opacity: 0.28; }

    #draw-canvas {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: crosshair;
      background: transparent;
    }

    /* Scaffold generation loading indicator */
    .scaffold-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
      z-index: 5;
      border-radius: var(--radius);
    }
    .scaffold-loading.show { opacity: 1; }
    /* Pencil spinner — a pencil draws a line while the sketch generates.
       Pencil tip rides the leading edge of the stroke (both SMIL-driven, locked). */
    .scaffold-loading svg { width: 94px; height: 94px; display: block; }
    .scaffold-loading .pl-fill  { fill: var(--paper); }
    .scaffold-loading .pl-track { fill: none; stroke: rgba(49,19,102,0.12); stroke-width: 3; }
    .scaffold-loading .pl-arc   { fill: none; stroke: var(--accent); stroke-width: 3;
                                  stroke-linecap: round; stroke-dasharray: 72 217;
                                  transform-box: fill-box; transform-origin: center;
                                  animation: plArc 1.1s linear infinite; }
    .scaffold-loading .pl-line  { fill: none; stroke: var(--ink); stroke-width: 2.4;
                                  stroke-linecap: round; stroke-linejoin: round;
                                  stroke-dasharray: 1;
                                  animation: plDraw 2s linear infinite; }
    .scaffold-loading .pl-pencil { transform-origin: 0 0;
                                  animation: plPencil 2s linear infinite; }
    .scaffold-loading .pl-graphite { fill: var(--ink); }
    .scaffold-loading .pl-wood     { fill: var(--paper); stroke: var(--ink); stroke-width: 1.3;
                                     stroke-linejoin: round; }
    .scaffold-loading .pl-ferrule  { fill: var(--ink); }
    .scaffold-loading .pl-eraser   { fill: var(--accent); }
    @keyframes plArc { to { transform: rotate(360deg); } }
    @keyframes plDraw {
      0%   { stroke-dashoffset: 1; }
      60%  { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 0; }
    }
    /* pencil tip rides the leading edge of the stroke (points sampled from #pl-path).
       Translate only — the lean is a static inner group, so the tip stays exact. */
    @keyframes plPencil {
      0%   { transform: translate(30px,56px); }
      6%   { transform: translate(32.7px,50.96px); }
      12%  { transform: translate(37.83px,49.75px); }
      18%  { transform: translate(41.31px,54.21px); }
      24%  { transform: translate(43.56px,59.49px); }
      30%  { transform: translate(48px,62.75px); }
      36%  { transform: translate(52.44px,59.49px); }
      42%  { transform: translate(54.69px,54.21px); }
      48%  { transform: translate(58.17px,49.75px); }
      54%  { transform: translate(63.3px,50.96px); }
      60%  { transform: translate(66px,56px); }
      100% { transform: translate(66px,56px); }
    }
    @keyframes shimmerSweep {
      0%   { transform: translateX(0); }
      100% { transform: translateX(66.6%); }
    }

    .regen-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--btn);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease, opacity 0.15s;
      z-index: 10;
      color: #ffffff;
    }
    .regen-btn:active { opacity: 0.8; }
    .regen-btn.spin { transform: rotate(360deg); }

    .canvas-hint {
      position: absolute;
      bottom: 16px;
      left: 0; right: 0;
      text-align: center;
      font-family: var(--sans);
      font-size: var(--t-sm);
      line-height: 1.5;
      color: #474747;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .s1-bottom {
      padding: 12px 16px 32px;
      flex-shrink: 0;
    }

    /* ── Screen 1 two-state (intent ⇄ trace) ───────────── */
    .s1-tracebar {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 16px 20px 10px;
      flex-shrink: 0;
    }
    .s1-back-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: var(--t-lg);
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      flex-shrink: 0;
    }
    .s1-back-btn:active { opacity: 0.6; }
    /* Remove inline-SVG baseline gap so the arrow centers with the label */
    .s1-back-btn svg, .s2-back-btn svg, .s3-back-btn svg { display: block; }
    .s1-word-chip {
      background: var(--card-bg);
      border: 1px solid var(--accent-line);
      color: var(--ink);
      font-family: var(--font);
      font-size: var(--t-base);
      font-weight: 500;
      border-radius: 100px;
      padding: 6px 16px;
      cursor: pointer;
    }
    .s1-word-chip:active { opacity: 0.7; }

    #screen1.state-trace  .s1-top      { display: none; }
    #screen1.state-trace  .s1-tracebar { display: flex; }
    #screen1.state-intent .s1-bottom   { display: none; }
    #screen1.state-intent .canvas-hint,
    #screen1.state-intent .regen-btn   { display: none; }
    #screen1.state-intent .canvas-area { display: none; }

    /* ── Demo cat (intent state only, look-only) ───────── */
    .demo-cat {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }
    #screen1.state-trace .demo-cat { display: none; }
    /* intent shows only the demo cat — hide the real scaffold + strokes */
    #screen1.state-intent #scaffold-img,
    #screen1.state-intent #draw-canvas { visibility: hidden; }

    /* ── "Trace this cat" shortcut (intent state only) ──── */
    .trace-this-btn {
      position: absolute;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--btn);
      color: var(--btn-text);
      border: none;
      border-radius: 100px;
      padding: 11px 22px;
      font-family: var(--sans);
      font-size: var(--t-sm);
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      z-index: 5;
      transition: opacity 0.15s, transform 0.15s;
    }
    .trace-this-btn:active { opacity: 0.85; transform: translateX(-50%) scale(0.96); }
    #screen1.state-trace .trace-this-btn { display: none; }
    .demo-cat .dc-base {
      fill: none;
      stroke: var(--ink);
      stroke-width: 4.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.14;
    }
    .demo-cat .dc-ghost {
      fill: none;
      stroke: var(--ink);
      stroke-width: 5.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      animation: dcTrace 5s ease-in-out infinite;
    }
    @keyframes dcTrace {
      0%   { stroke-dashoffset: 1; opacity: 0; }
      6%   { opacity: 0.5; }
      55%  { stroke-dashoffset: 0; opacity: 0.5; }
      78%  { stroke-dashoffset: 0; opacity: 0.5; }
      92%  { stroke-dashoffset: 0; opacity: 0; }
      100% { stroke-dashoffset: 1; opacity: 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .demo-cat .dc-ghost { animation: none; opacity: 0.42; stroke-dashoffset: 0; }
    }

    /* ══════════════════════════════════════════════════
       SCREEN 2 — Artist + Output
    ══════════════════════════════════════════════════ */
    #screen2 {
      background: var(--paper);
    }

    .s2-top {
      flex-shrink: 0;
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .s2-top-label {
      font-family: var(--sans);
      font-size: var(--t-base);
      font-weight: 400;
      color: var(--ink);
    }

    .s2-canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 0 16px 0;
      border-radius: var(--radius);
      background: var(--canvas-bg);
      border: 1px solid var(--accent-line);
    }

    /* Persistent scaffold — same image from Screen 1 */
    #s2-scaffold-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.28;
      pointer-events: none;
      z-index: 0;
      transition: opacity 0.3s ease;
    }
    /* While the artist style generates, hide the guide sketch — clean canvas + spinner */
    .s2-canvas-wrap:has(#style-loading.show) #s2-scaffold-img { opacity: 0; }

    #style-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }
    #style-img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.6s ease;
      z-index: 2;
    }
    #style-img.visible { opacity: 1; }

    .artist-deck {
      flex-shrink: 0;
      padding: 16px 16px 36px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--paper);
    }

    .artist-cards {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .artist-cards::-webkit-scrollbar { display: none; }

    .artist-card {
      flex: 0 0 auto;
      width: 100px;
      background: var(--paper);
      border: 1px solid var(--accent);
      border-radius: 12px;
      padding: 10px 8px;
      cursor: pointer;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      text-align: left;
    }
    .artist-card:active { transform: scale(0.97); }
    .artist-card.selected {
      background: var(--card-bg);
      border-color: var(--accent);
    }

    .artist-name {
      font-family: var(--font);
      font-weight: 500;
      font-size: var(--t-sm);
      color: var(--ink);
      display: block;
      margin-bottom: 4px;
      line-height: 1.15;
    }
    .artist-style {
      font-family: var(--sans);
      font-size: var(--t-xs);
      color: var(--ink);
    }

    .s2-actions {
      display: flex;
      gap: 10px;
    }

    .s2-regen-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--card-bg);
      border: 1px solid var(--accent-line);
      color: var(--ink);
      border-radius: 100px;
      height: 38px;
      padding: 0 14px 0 8px;
      gap: 4px;
      font-size: var(--t-sm);
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, color 0.15s, border-color 0.15s;
      z-index: 10;
      line-height: 1;
      white-space: nowrap;
    }
    .s2-regen-btn.visible { opacity: 1; pointer-events: auto; }
    .s2-regen-btn:active { opacity: 0.6; }
    .s2-regen-btn:hover { border-color: var(--muted); color: var(--ink); }

    .s2-back-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: var(--t-lg);
      cursor: pointer;
      padding: 2px 4px;
      flex-shrink: 0;
      line-height: 1;
    }
    .s2-back-btn:active { opacity: 0.6; }

    .s2-done-btn {
      background: var(--btn);
      color: var(--btn-text);
      border: none;
      border-radius: 100px;
      padding: 14px 32px;
      font-size: var(--t-base);
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      flex: 1;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .s2-done-btn:active { opacity: 0.8; }

    /* ══════════════════════════════════════════════════
       SCREEN 3 — Final
    ══════════════════════════════════════════════════ */
    #screen3 {
      background: var(--paper);
    }

    .s3-top {
      flex-shrink: 0;
      padding: 18px 20px 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .s3-back-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      font-size: var(--t-lg);
      cursor: pointer;
      padding: 2px 4px;
      flex-shrink: 0;
      line-height: 1;
    }

    .s3-title {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 8px;
      font-family: var(--font);
      font-size: var(--t-lg);
      font-weight: 400;
      color: var(--ink);
      line-height: 1.25;
      white-space: nowrap;
    }
    .s3-title-for,
    .s3-title-by {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--accent);
      font-family: var(--font);
      font-size: var(--t-lg);
      color: var(--accent);
      text-align: center;
      padding: 0 2px;
      outline: none;
      flex: 1;
      width: auto;
      min-width: 0;
    }
    .s3-title-for::placeholder,
    .s3-title-by::placeholder { color: var(--accent); opacity: 0.55; }

    .s3-canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 0 16px 0;
      border-radius: var(--radius);
      background: #fff;
      border: 1px solid var(--accent-line);
      perspective: 1800px;
    }

    #final-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .replay-stamp {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 64px;
      height: 64px;
      border-radius: 10px;
      overflow: hidden;
      border: 1.5px solid rgba(0,0,0,0.12);
      background: #f0ece4;
    }

    #replay-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Final card flip — front artwork ⇄ artist bio ── */
    .s3-flip {
      position: absolute; inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0.15, 0.2, 1);
    }
    .s3-flip.flipped { transform: rotateY(180deg); }
    .s3-face {
      position: absolute; inset: 0;
      backface-visibility: hidden;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .s3-back { transform: rotateY(180deg); background: #fff; }
    .s3-back-inner {
      height: 100%; overflow-y: auto;
      padding: 30px 26px 26px;
      -webkit-overflow-scrolling: touch;
    }
    .s3-back-title { font-size: var(--t-lg); font-weight: 700; color: var(--accent); margin-bottom: 4px; line-height: 1.2; }
    .s3-back-dates { font-size: var(--t-xs); color: var(--muted); margin-bottom: 18px; line-height: 1.55; }
    .s3-back-bio p { font-size: var(--t-sm); line-height: 1.65; color: var(--ink); margin-bottom: 12px; }
    .s3-back-bio p:last-child { margin-bottom: 40px; }
    .s3-flip-btn {
      position: absolute; z-index: 5;
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 13px; border-radius: 100px;
      background: rgba(255,255,255,0.92); border: 1.5px solid var(--accent-line);
      color: var(--accent); font-family: var(--font); font-size: 13px; font-weight: 600;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    /* front: top-right, just under the card's byline strip */
    .s3-front .s3-flip-btn { top: 54px; right: 14px; }
    .s3-front { background: #fff; }
    /* back: bottom-left */
    .s3-back .s3-flip-btn { bottom: 18px; left: 18px; }
    .s3-flip-btn:active { opacity: 0.8; }
    .s3-flip-btn svg { display: block; }

    .s3-bottom {
      flex-shrink: 0;
      padding: 16px 16px 40px;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 10px;
      background: var(--paper);
    }
    .s3-bottom > .btn-copy,
    .s3-bottom > .btn-restart { flex: 1 1 0; min-width: 0; width: auto; box-sizing: border-box; }

    .s3-row {
      display: flex;
      gap: 10px;
    }

    .btn-restart {
      background: var(--btn);
      color: var(--btn-text);
      border: none;
      border-radius: 100px;
      padding: 14px 20px;
      font-size: var(--t-base);
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-restart:active { opacity: 0.8; }

    .btn-copy {
      background: transparent;
      color: var(--btn);
      border: 1px solid var(--btn);
      border-radius: 100px;
      padding: 14px 20px;
      font-size: var(--t-base);
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      flex: 1;
      transition: opacity 0.15s;
    }
    .btn-copy:active { opacity: 0.7; }

    .btn-save {
      background: var(--btn);
      color: var(--btn-text);
      border: none;
      border-radius: 100px;
      padding: 14px 20px;
      font-size: var(--t-base);
      font-family: var(--sans);
      font-weight: 500;
      cursor: pointer;
      flex: 1;
      transition: opacity 0.15s;
    }
    .btn-save:active { opacity: 0.8; }

    /* ── Loading pulse ─────────────────────────────── */
    .pulse-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 20;
      border-radius: var(--radius);
      background: transparent;
    }
    .pulse-overlay.show { opacity: 1; pointer-events: all; }
    /* Artist-photo spinner — ring + sweeping arc around the artist's portrait */
    .artist-spinner { position: relative; width: 94px; height: 94px; }
    .artist-spinner .ps-photo {
      position: absolute; inset: 6px; width: 82px; height: 82px;
      border-radius: 50%; object-fit: cover; background: var(--scaffold);
    }
    .artist-spinner svg { position: absolute; inset: 0; width: 94px; height: 94px; }
    .artist-spinner .ps-track { fill: none; stroke: rgba(49,19,102,0.12); stroke-width: 3; }
    .artist-spinner .ps-arc   { fill: none; stroke: var(--accent); stroke-width: 3;
      stroke-linecap: round; stroke-dasharray: 72 217;
      transform-box: fill-box; transform-origin: center;
      animation: plArc 1.1s linear infinite; }
    #style-loading { flex-direction: column; gap: 16px; }
    .spinner-label {
      font-family: var(--font); font-size: 14px; color: var(--ink);
      text-align: center; max-width: 240px; line-height: 1.3;
      animation: labelPulse 1.6s ease-in-out infinite;
    }
    @keyframes labelPulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }

    /* ── Spinning card — one-time loader on "Choose your artist".
       Lives inside the Screen-2 canvas, so it keeps the canvas size; the rest
       of Screen 2 stays visible (non-interactive) behind it. ── */
    #card-spin {
      position: absolute; inset: 0; z-index: 10;
      display: none; perspective: 1300px;
      background: var(--paper);   /* page yellow behind the rotating card */
      border-radius: var(--radius); overflow: hidden;
      opacity: 0; transition: opacity 0.3s ease;
    }
    #card-spin.show { display: block; opacity: 1; }
    #card-spin.settling { opacity: 0; }
    .card-spin-card {
      /* inset from the canvas edges so the 3D rotation never gets clipped */
      position: absolute; inset: 3% 13%;
      transform-style: preserve-3d;
      animation: cardSpin 1.9s linear infinite;
    }
    @keyframes cardSpin { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
    .csc-face {
      position: absolute; inset: 0;
      border-radius: var(--radius); overflow: hidden;
      backface-visibility: hidden;
      background: var(--canvas-bg);
      border: 1px solid var(--accent-line);   /* the canvas purple outline rotates with the card */
    }
    .csc-back { transform: rotateY(180deg); }
    .csc-face img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: block; }
    .csc-strokes { background: transparent; }  /* traced lines overlay the sketch, both rotate together */
    /* While the card spins, hide the canvas's static frame so only the rotating outline shows */
    .s2-canvas-wrap:has(#card-spin.show) { border-color: transparent; }
    .card-spin-label {
      position: absolute; left: 0; right: 0; bottom: 16px;
      text-align: center;
      font-family: var(--font); font-size: 14px; color: var(--ink);
      animation: labelPulse 1.6s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pulse-dot { display: none; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ═══════════════════════════════════════
       SCREEN 1: Intent + Trace
  ═══════════════════════════════════════ -->
  <div id="screen1" class="screen active state-intent">
    <div class="s1-top">
      <h1>Turn your intention into a surprising <em>Artifakt</em></h1>
      <p class="sub">Think of someone. What word fits them?</p>
      <div class="keyword-row">
        <div class="keyword-row-input-wrap">
          <input
            id="keyword-input"
            type="text"
            placeholder="Type your term here"
            maxlength="30"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
          />
        </div>
        <button id="confirm-btn" disabled aria-label="Confirm keyword"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 12H21M16.75 16.25L21 12L16.75 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
      <div class="keyword-examples">
        <button class="kw-tag">drag queen</button>
        <button class="kw-tag">dreamer</button>
        <button class="kw-tag">rebel</button>
        <button class="kw-tag">optimist</button>
        <button class="kw-tag">perfectionist</button>
        <button class="kw-tag">adventurer</button>
        <button class="kw-tag">comfort</button>
        <button class="kw-tag">nostalgia</button>
        <button class="kw-tag">curiosity</button>
        <button class="kw-tag">courage</button>
        <button class="kw-tag">joy</button>
        <button class="kw-tag">dragon</button>
        <button class="kw-tag">compass</button>
        <button class="kw-tag">lighthouse</button>
        <button class="kw-tag">sunflower</button>
        <button class="kw-tag">telescope</button>
        <button class="kw-tag">treasure map</button>
        <button class="kw-tag">disco ball</button>
        <button class="kw-tag">bear hug</button>
        <button class="kw-tag">time machine</button>
        <button class="kw-tag">lucky charm</button>
        <button class="kw-tag">secret garden</button>
      </div>
    </div>

    <div class="s1-tracebar">
      <button class="s1-back-btn" id="s1-back-btn" aria-label="Edit word"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 12H3M7.25 16.25L3 12L7.25 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button class="s1-word-chip" id="s1-word-chip" aria-label="Edit word"></button>
    </div>

    <div class="s1-trace-title">
      <h2>Trace the image</h2>
    </div>

    <div class="canvas-area" id="canvas-area">
      <div class="zoom-layer" id="zoom-layer">
        <img id="scaffold-img" alt="" />
        <canvas id="draw-canvas"></canvas>
      </div>
      <button class="regen-btn" id="regen-btn" title="New motif"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke-width="1.5"><path d="M21 21L9 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path><path d="M14.9142 3.41421L19.864 8.36396C20.645 9.14501 20.645 10.4113 19.864 11.1924L10.6213 20.435C10.2596 20.7968 9.76894 21 9.25736 21C8.74577 21 8.25514 20.7968 7.8934 20.435L2.8934 15.435C2.11235 14.654 2.11235 13.3877 2.8934 12.6066L7 8.5L11.75 13.25C12.4404 13.9404 13.5596 13.9404 14.25 13.25C14.9404 12.5596 14.9404 11.4404 14.25 10.75L9.5 6L12.0858 3.41421C12.8668 2.63317 14.1332 2.63317 14.9142 3.41421Z" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path></svg></button>
      <div class="canvas-hint" id="canvas-hint">Draw over the guide with your finger<br>Pinch to zoom in and out</div>
      <div class="scaffold-loading" id="scaffold-loading">
        <svg viewBox="0 0 100 100" aria-hidden="true">
          <circle class="pl-fill"  cx="50" cy="50" r="46"/>
          <circle class="pl-track" cx="50" cy="50" r="46"/>
          <circle class="pl-arc"   cx="50" cy="50" r="46"/>
          <!-- the line being drawn -->
          <path id="pl-path" class="pl-line" pathLength="1"
                d="M 30 56 C 33 47 39 47 42 56 C 45 65 51 65 54 56 C 57 47 63 47 66 56"/>
          <!-- pencil: tip at (0,0), body up; CSS translate rides the path leading edge.
               Inner group holds the static lean (rotates about the tip at 0,0). -->
          <g class="pl-pencil">
            <g transform="rotate(-22)">
              <polygon class="pl-graphite" points="0,0 -1.7,-4 1.7,-4"/>
              <polygon class="pl-wood" points="-1.7,-4 1.7,-4 3.4,-9 -3.4,-9"/>
              <rect class="pl-wood"    x="-3.4" y="-33" width="6.8" height="24" rx="0.6"/>
              <rect class="pl-ferrule" x="-3.4" y="-37" width="6.8" height="4"/>
              <rect class="pl-eraser"  x="-3.4" y="-42.5" width="6.8" height="5.5" rx="2"/>
            </g>
          </g>
        </svg>
      </div>
    </div>

    <div class="s1-bottom">
      <button class="btn-primary" id="next-btn" disabled>Choose your artist <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 12H21M16.75 16.25L21 12L16.75 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       SCREEN 2: Artist + Output
  ═══════════════════════════════════════ -->
  <div id="screen2" class="screen">
    <div class="s2-top">
      <button class="s2-back-btn" id="s2-back-btn" aria-label="Back"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M21 12H3M7.25 16.25L3 12L7.25 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <span class="s2-top-label">Choose your artist</span>
    </div>
    <div class="s2-canvas-wrap">
      <img id="s2-scaffold-img" alt="" />
      <canvas id="style-canvas"></canvas>
      <img id="style-img" alt="">
      <div class="pulse-overlay" id="style-loading">
        <div class="artist-spinner">
          <img id="artist-spinner-img" class="ps-photo" alt="" />
          <svg viewBox="0 0 100 100" aria-hidden="true">
            <circle class="ps-track" cx="50" cy="50" r="46"/>
            <circle class="ps-arc"   cx="50" cy="50" r="46"/>
          </svg>
        </div>
        <div class="spinner-label" id="spinner-label"></div>
      </div>
      <!-- One-time spinning card: fills the canvas, spins until the first artwork loads -->
      <div id="card-spin">
        <div class="card-spin-card">
          <div class="csc-face csc-front">
            <img id="card-spin-img" class="csc-sketch" alt="" />
            <img id="card-spin-strokes" class="csc-strokes" alt="" />
          </div>
          <div class="csc-face csc-back">
            <img id="card-spin-img-back" class="csc-sketch" alt="" />
            <img id="card-spin-strokes-back" class="csc-strokes" alt="" />
          </div>
        </div>
      </div>
      <button class="s2-regen-btn" id="regen-artist-btn" title="Regenerate"><svg width="22" height="22" viewBox="0 0 24 25" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4.37771 15.4959C4.19685 15.4957 4.07557 15.4961 4.01387 15.4971C4.01245 15.4971 4.01103 15.4968 4.0097 15.4963C4.00837 15.4958 4.00717 15.495 4.00615 15.494C4.00513 15.493 4.00432 15.4918 4.00377 15.4905C4.00321 15.4892 4.00293 15.4878 4.00293 15.4863V13.9987C4.00293 13.9973 4.0032 13.996 4.00374 13.9947C4.00427 13.9934 4.00505 13.9923 4.00603 13.9913C4.00702 13.9903 4.00818 13.9896 4.00946 13.9891C4.01074 13.9886 4.01211 13.9883 4.01349 13.9883C4.13343 13.9898 4.25176 13.9898 4.3685 13.9883C4.73791 13.9836 5.07077 13.9116 5.36709 13.7723C5.6533 13.6379 5.90034 13.4469 6.10821 13.1992C8.42424 10.4406 10.5091 7.95423 12.3628 5.74022C12.4954 5.58175 12.6672 5.419 12.8781 5.25196C13.306 4.91314 13.7857 4.67922 14.3172 4.5502C14.5958 4.48262 14.8683 4.44844 15.1345 4.44767C15.7598 4.44601 16.4345 4.44588 17.1588 4.44729C17.1593 4.4473 17.1597 4.44716 17.1601 4.44689C17.1605 4.44662 17.1609 4.44622 17.161 4.44575C17.1612 4.44528 17.1613 4.44476 17.1612 4.44425C17.1611 4.44374 17.1608 4.44326 17.1605 4.44287C17.0623 4.34444 16.7295 4.01126 16.1619 3.44332C16.1191 3.4005 16.0678 3.34521 16.04 3.2974C15.8923 3.04492 15.8833 2.74617 16.0312 2.49503C16.0961 2.38495 16.1865 2.29798 16.3026 2.2341C16.5906 2.0759 16.97 2.11929 17.2081 2.35833C17.7746 2.92703 18.719 3.87206 20.0413 5.1934C20.0431 5.19524 20.0441 5.19772 20.0441 5.20031C20.0441 5.2029 20.0431 5.20539 20.0413 5.20722C19.273 5.97254 18.3286 6.91564 17.2081 8.03654C17.0943 8.15033 16.9539 8.22118 16.7869 8.24908C16.5319 8.2917 16.2919 8.19666 16.1126 8.01273C16.0629 7.96178 16.0226 7.89964 15.9918 7.8263C15.8622 7.51852 15.9225 7.19154 16.1577 6.9573C16.5802 6.5367 16.9146 6.20306 17.1609 5.95641C17.1612 5.9561 17.1613 5.95572 17.1614 5.95531C17.1615 5.95491 17.1615 5.95449 17.1613 5.95412C17.1612 5.95375 17.1609 5.95345 17.1606 5.95324C17.1603 5.95303 17.1599 5.95293 17.1595 5.95295C16.6354 5.95334 16.002 5.9534 15.2593 5.95314C15.1697 5.95295 14.9871 5.9543 14.864 5.9781C14.6911 6.01126 14.5621 6.04185 14.4771 6.06988C14.2123 6.15679 13.9599 6.30143 13.7201 6.5038C13.6851 6.53324 13.6451 6.57228 13.6001 6.62092C13.5334 6.69311 13.4957 6.73439 13.4872 6.74476C12.0745 8.43001 10.0205 10.8799 7.32491 14.0943C7.15077 14.3021 6.95608 14.5037 6.74527 14.6726C6.34066 14.9966 5.88555 15.2273 5.37995 15.3646C5.05611 15.4527 4.72203 15.4964 4.37771 15.4959Z" fill="currentColor"/><path d="M4.79736 4.94846C4.79736 5.02603 4.82213 5.11876 4.90469 5.14468C5.79269 5.42404 6.53074 6.06763 6.98194 6.87768C7.09842 7.0867 7.20076 7.30776 7.28895 7.54084C7.30565 7.58462 7.32965 7.62206 7.37112 7.63473C7.4654 7.66372 7.67967 7.68273 7.7246 7.55908C7.80933 7.32574 7.91276 7.10052 8.03487 6.88344C8.38917 6.25278 8.87532 5.76305 9.4933 5.41425C9.69279 5.30174 9.91244 5.21496 10.133 5.13777C10.2027 5.11339 10.2246 5.01509 10.2246 4.95C10.2246 4.8851 10.2027 4.7866 10.1332 4.76222C9.91263 4.68504 9.69298 4.59806 9.49368 4.48536C8.87583 4.13617 8.38994 3.64619 8.03602 3.0154C7.91404 2.79819 7.8108 2.57291 7.72632 2.33956C7.6814 2.21572 7.46712 2.23473 7.37285 2.26353C7.33138 2.27621 7.30738 2.31364 7.29048 2.35742C7.20216 2.59051 7.0997 2.8115 6.98309 3.0204C6.53151 3.83025 5.79308 4.47326 4.90469 4.75204C4.82232 4.77796 4.79736 4.8707 4.79736 4.94846Z" fill="currentColor"/><path d="M15.5216 12.9865C15.8341 12.9853 16.3793 12.9851 17.1573 12.986C17.1581 12.986 17.1589 12.9857 17.1595 12.9853C17.1602 12.9848 17.1607 12.9842 17.161 12.9835C17.1613 12.9828 17.1614 12.982 17.1613 12.9812C17.1611 12.9805 17.1607 12.9798 17.1601 12.9792C16.5772 12.3984 16.2309 12.0522 16.121 11.9407C16.065 11.8838 16.0202 11.8151 15.9868 11.7347C15.8737 11.4628 15.9116 11.1272 16.1276 10.9116C16.2251 10.8143 16.3491 10.7325 16.4805 10.7023C16.6515 10.6628 16.8143 10.6751 16.9689 10.7392C17.0751 10.7832 17.1575 10.8519 17.2529 10.9475C18.515 12.210     </div>
    <div class="artist-deck">
      <div class="artist-cards" id="artist-cards"></div>
      <div class="s2-actions">
        <button class="s2-done-btn" id="done-btn">Create your card <svg class="btn-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 12H21M16.75 16.25L21 12L16.75 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════
       SCREEN 3: Final
  ═══════════════════════════════════════ -->

/* ══════════════════════════════════════════════════════════

const FAL_API_KEY = '77e88931-c234-44b4-b4d0-3181195a2730:13035cfa73c8fce02b49cbc6aa2d43e5';
let replicateResultUrl = null; // reused as falResultUrl for Screen 3

/* ── Browser-side Variant C contour reduction ───────────────
   Approximates the Python OpenCV pipeline from Experiment 006:
   grayscale → Gaussian blur → Sobel edges → threshold →
   connected-component analysis → keep top 50% by pixel count
   Set false to display the raw fal.ai image for debugging.
────────────────────────────────────────────────────────────── */
const SCAFFOLD_CONTOUR_REDUCTION = true;

// Separable binary dilation — O(w*h) regardless of radius.
// Equivalent to RETR_EXTERNAL: connects nearby strokes into solid filled regions.
function _dilateBinary(src, w, h, radius) {
  const tmp = new Uint8Array(w * h), dst = new Uint8Array(w * h);
  for (let y = 0; y < h; y++) {
    let ones = 0;
    for (let k = 0; k <= radius && k < w; k++) if (src[y*w+k]) ones++;
    for (let x = 0; x < w; x++) {
      tmp[y*w+x] = ones > 0 ? 1 : 0;
      if (x+radius+1 < w && src[y*w+x+radius+1]) ones++;
      if (x-radius   >= 0 && src[y*w+x-radius])   ones--;
    }
  }
  for (let x = 0; x < w; x++) {
    let ones = 0;
    for (let k = 0; k <= radius && k < h; k++) if (tmp[k*w+x]) ones++;
    for (let y = 0; y < h; y++) {
      dst[y*w+x] = ones > 0 ? 1 : 0;
      if (y+radius+1 < h && tmp[(y+radius+1)*w+x]) ones++;
      if (y-radius   >= 0 && tmp[(y-radius)*w+x])   ones--;
    }
  }
  return dst;
}

function _keepTopComponents(bin, w, h, frac, minSize = 0) {
  const labels = new Int32Array(w * h).fill(-1);
  const sizes  = [];
  const q      = new Int32Array(w * h);
  for (let s = 0; s < w * h; s++) {
    if (!bin[s] || labels[s] !== -1) continue;
    const id = sizes.length;
    let head = 0, tail = 0, sz = 0;
    q[tail++] = s; labels[s] = id;
    while (head < tail) {
      const p = q[head++]; sz++;
      const x = p % w, y = (p / w) | 0;
      if (x > 0     && bin[p-1] && labels[p-1] === -1) { labels[p-1] = id; q[tail++] = p-1; }
      if (x < w-1   && bin[p+1] && labels[p+1] === -1) { labels[p+1] = id; q[tail++] = p+1; }
      if (y > 0     && bin[p-w] && labels[p-w] === -1) { labels[p-w] = id; q[tail++] = p-w; }
      if (y < h-1   && bin[p+w] && labels[p+w] === -1) { labels[p+w] = id; q[tail++] = p+w; }
    }
    sizes.push(sz);
  }
  const eligible = sizes.map((s, i) => s >= minSize ? i : -1).filter(i => i !== -1);
  eligible.sort((a, b) => sizes[b] - sizes[a]);
  const nKeep  = Math.max(1, Math.round(eligible.length * frac));
  const keepSet = new Set(eligible.slice(0, nKeep));
  const keepId = new Uint8Array(sizes.length);
  for (const i of keepSet) keepId[i] = 1;
  const out = new Uint8Array(w * h);
  for (let i = 0; i < w * h; i++) if (bin[i] && labels[i] !== -1 && keepId[labels[i]]) out[i] = 1;
  return out;
}

async function _processVariantC(rawUrl) {
  const t0 = performance.now();
  console.log('[VariantC] fetching image…');
  // Fetch as blob first so canvas pixel-read is never CORS-tainted
  const blob    = await fetch(rawUrl).then(r => r.blob());
  const blobUrl = URL.createObjectURL(blob);
  console.log(`[VariantC] fetch done in ${(performance.now()-t0).toFixed(0)}ms`);
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const w = img.naturalWidth, h = img.naturalHeight;
      console.log(`[VariantC] image ${w}×${h}, starting processing…`);
      const sc = document.createElement('canvas'); sc.width = w; sc.height = h;
      sc.getContext('2d').drawImage(img, 0, 0);
      const px = sc.getContext('2d').getImageData(0, 0, w, h).data;
      // 1. Grayscale
      const gray = new Uint8Array(w * h);
      for (let i = 0; i < w*h; i++)
        gray[i] = (0.299*px[i*4] + 0.587*px[i*4+1] + 0.114*px[i*4+2]) | 0;
      // 2. Threshold: dark pixels = sketch marks (pencil lines on white paper)
      const marks = new Uint8Array(w * h);
      for (let i = 0; i < w*h; i++) marks[i] = gray[i] < 190 ? 1 : 0;
      console.log(`[VariantC] threshold done ${(performance.now()-t0).toFixed(0)}ms`);
      // 3. Dilate heavily to fill gaps between strokes → solid filled regions
      //    Equivalent to what RETR_EXTERNAL sees: the outer shape of each ink mass
      const filled = _dilateBinary(marks, w, h, 15);
      console.log(`[VariantC] dilation done ${(performance.now()-t0).toFixed(0)}ms`);
      // 4. Trace outer boundary of filled regions (= RETR_EXTERNAL contour)
      const boundary = new Uint8Array(w * h);
      for (let y = 1; y < h-1; y++)
        for (let x = 1; x < w-1; x++)
          if (filled[y*w+x] && (!filled[(y-1)*w+x] || !filled[(y+1)*w+x] || !filled[y*w+x-1] || !filled[y*w+x+1]))
            boundary[y*w+x] = 1;
      console.log(`[VariantC] boundary done ${(performance.now()-t0).toFixed(0)}ms`);
      // 5. Keep top 40% of boundary components, min 300px — removes tiny fragments
      const kept = _keepTopComponents(boundary, w, h, 0.40, 300);
      console.log(`[VariantC] components done ${(performance.now()-t0).toFixed(0)}ms`);
      // render black-on-white
      const oc = document.createElement('canvas'); oc.width = w; oc.height = h;
      const octx = oc.getContext('2d');
      const od = octx.createImageData(w, h);
      for (let i = 0; i < w*h; i++) {
        const v = kept[i] ? 0 : 255;
        od.data[i*4] = od.data[i*4+1] = od.data[i*4+2] = v; od.data[i*4+3] = 255;
      }
      octx.putImageData(od, 0, 0);
      oc.toBlob(b => {
        URL.revokeObjectURL(blobUrl);
        console.log(`[VariantC] total ${(performance.now()-t0).toFixed(0)}ms`);
        resolve(URL.createObjectURL(b));
      });
    };
    img.onerror = (e) => { console.error('[VariantC] image load error', e); reject(e); };
    img.src = blobUrl;
  });
}

/* ── AI Scaffold generation ──────────────────────────────────
   Generates a loose pencil-sketch image for any keyword.
   Fades in behind the draw canvas once ready.
────────────────────────────────────────────────────────────── */
const scaffoldCache = {};      // keyword → processed image blob URL
let scaffoldGenId   = 0;       // cancel stale requests

async function generateScaffold(keyword) {
  const scaffoldImg     = document.getElementById('scaffold-img');
  const scaffoldLoading = document.getElementById('scaffold-loading');

  // Reset previous scaffold instantly
  scaffoldImg.classList.remove('ready');

  // Serve from cache — instant, no loading dots needed
  if (scaffoldCache[keyword]) {
    scaffoldImg.src = scaffoldCache[keyword];
    requestAnimationFrame(() => {
      scaffoldImg.classList.add('ready');
      redrawCanvas();
    });
    return;
  }

  if (!FAL_API_KEY) return;

  // Show loading dots immediately on the white canvas
  scaffoldLoading.classList.add('show');
  const genId = ++scaffoldGenId;

  try {
    // Representation: vague words like "diverse" collapse to the model's
    // default (thin, white, European features), so we anchor a specific,
    // POC-centered subject in the FOREGROUND and rotate it each generation.
    const SUBJECT_POOL = [
      'a Black woman with natural coiled or afro hair, broad features',
      'a dark-skinned Black person with full-figured body and locs',
      'an East Asian woman with straight black hair and dark features',
      'a Southeast Asian woman with dark hair, soft rounded body',
      'a South Asian woman with dark wavy hair and strong features',
      'a brown-skinned plus-size woman, curvy full body',
      'a Black trans or non-binary person with textured dark hair',
      'an Indigenous or Latina woman with dark hair and features',
      'an older woman of color with a soft rounded body',
    ];
    const subject = SUBJECT_POOL[Math.floor(Math.random() * SUBJECT_POOL.length)];

    const prompt = `Create a traceable sketch scaffold inspired by "${keyword}".

The drawing should feel like an early sketchbook exploration rather than a finished illustration. Its purpose is to provide a starting point, spark imagination, reduce blank-page anxiety, and invite the user to interpret and complete the idea through tracing. The image should suggest a direction rather than provide a final answer.

Prioritize: a strong concept, an expressive silhouette, movement and gesture, simplicity.

The drawing should feel playful, creative, intelligent, slightly unexpected, expressive, and human-made.

Use: loose pencil sketch lines, construction lines, gesture drawing, simplified contours, unfinished forms, open shapes, visible sketch energy.

Avoid: polished illustrations, finished line art, realistic rendering, coloring-book style drawings, highly detailed anatomy, detailed facial features, decorative textures, shading, backgrounds.

For abstract concepts, explore visual metaphors, expressive characters, symbolic objects, or unexpected combinations. Do not default to the most common or clichéd representation. Favor ideas that feel imaginative, witty, playful, queer-friendly, and open to interpretation.

If people appear: prioritize expressive poses, silhouettes, and body language. Avoid detailed facial features, fashion illustration aesthetics, and superhero-comic rendering. Represent a broad range of bodies, genders, and identities — avoid defaulting to thin, white, masculine-presenting figures. ${subject ? `If a human figure is central, draw ${subject}.` : ''}

Leave meaningful gaps and ambiguity so the user can complete the image through tracing. The final image should feel like a sketch an illustrator made while searching for an idea, not the final illustration itself.`;

    const res = await fetch('https://fal.run/fal-ai/flux/schnell', {
      method: 'POST',
      headers: { 'Authorization': `Key ${FAL_API_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, num_inference_steps: 2, image_size: 'portrait_4_3', num_images: 1 })
    });

    if (genId !== scaffoldGenId) return;
    const data = await res.json();
    if (genId !== scaffoldGenId) return;
    const rawUrl = data?.images?.[0]?.url;
    if (!rawUrl) {
      console.warn('Scaffold generation returned no image:', data);
      scaffoldLoading.classList.remove('show');
      return;
    }

    // Apply browser-side Variant C contour reduction (or show raw for debugging)
    const url = SCAFFOLD_CONTOUR_REDUCTION ? await _processVariantC(rawUrl) : rawUrl;
    if (genId !== scaffoldGenId) return;

    scaffoldCache[keyword] = url;
    scaffoldImg.onload = () => {
      if (genId !== scaffoldGenId) return;
      scaffoldImg.classList.add('ready');
      scaffoldLoading.classList.remove('show');
      redrawCanvas();
    };
    scaffoldImg.src = url;
  } catch (err) {
    console.warn('Scaffold generation failed:', err);
    scaffoldLoading.classList.remove('show');
  }
}

// ── Per-artist sketch preprocessing config ───────────────
const ARTIST_SKETCH_CONFIG = {
  bourgeois:  { lineWidth: 5,  invert: false, fill: false },
  walker:     { lineWidth: 14, invert: true,  fill: true  },
  saintphalle:{ lineWidth: 4,  invert: false, fill: false },

  haring:     { lineWidth: 9,  invert: false, fill: false },

// Flood-fill a canvas from a seed pixel (for Walker's solid silhouette)
function floodFill(ctx, w, h, startX, startY, fillColor) {
  const imageData = ctx.getImageData(0, 0, w, h);
  const data = imageData.data;
  const targetR = data[(startY * w + startX) * 4];
  const targetG = data[(startY * w + startX) * 4 + 1];
  const targetB = data[(startY * w + startX) * 4 + 2];
  if (targetR === fillColor[0] && targetG === fillColor[1] && targetB === fillColor[2]) return;
  const stack = [[startX, startY]];
  while (stack.length) {
    const [x, y] = stack.pop();
    if (x < 0 || x >= w || y < 0 || y >= h) continue;
    const i = (y * w + x) * 4;
    if (data[i] !== targetR || data[i+1] !== targetG || data[i+2] !== targetB) continue;
    data[i] = fillColor[0]; data[i+1] = fillColor[1]; data[i+2] = fillColor[2];
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imageData, 0, 0);
}

async function getSketchBase64(artistKey) {
  const config = ARTIST_SKETCH_CONFIG[artistKey] || { lineWidth: 8, invert: false, fill: false };

  return new Promise(resolve => {
    const srcW = drawCanvas.width / devicePixelRatio;
    const srcH = drawCanvas.height / devicePixelRatio;

    // Export at 768px wide for better model fidelity
    const exportW = 768;
    const scale   = exportW / srcW;
    const exportH = Math.round(srcH * scale);

    const tempCanvas = document.createElement('canvas');
    tempCanvas.width  = exportW;
    tempCanvas.height = exportH;
    const ctx = tempCanvas.getContext('2d');

    // Background: white normally, black for Walker (inverted)
    ctx.fillStyle = config.invert ? '#000000' : '#ffffff';
    ctx.fillRect(0, 0, exportW, exportH);

    // Stroke color: black normally, white for Walker
    ctx.strokeStyle = config.invert ? '#ffffff' : '#000000';
    ctx.lineWidth   = config.lineWidth * scale;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';

    state.strokes.forEach(stroke => {
      if (stroke.points.length < 2) return;
      ctx.beginPath();
      ctx.moveTo(stroke.points[0].x * scale, stroke.points[0].y * scale);
      stroke.points.forEach(p => ctx.lineTo(p.x * scale, p.y * scale));
      ctx.stroke();
    });

    // Walker: flood-fill enclosed shapes with white to create solid silhouette
    if (config.fill) {
      // Fill from center of canvas — catches the main subject area
      const cx = Math.round(exportW / 2);
      const cy = Math.round(exportH / 2);
      floodFill(ctx, exportW, exportH, cx, cy, [255, 255, 255]);
      // Then invert the whole image: white shapes become black, black bg stays
      const id = ctx.getImageData(0, 0, exportW, exportH);
      for (let i = 0; i < id.data.length; i += 4) {
        id.data[i]   = 255 - id.data[i];
        id.data[i+1] = 255 - id.data[i+1];
        id.data[i+2] = 255 - id.data[i+2];
      }
      ctx.putImageData(id, 0, 0);
    }

    resolve(tempCanvas.toDataURL('image/png').split(',')[1]);
  });
}

async function falImgToImg(base64Image, prompt, strength) {
  const res = await fetch('https://fal.run/fal-ai/flux/dev/image-to-image', {
    method: 'POST',
    headers: {
      'Authorization': `Key ${FAL_API_KEY}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      image_url: `data:image/png;base64,${base64Image}`,
      strength: strength,
      prompt: prompt,
      num_inference_steps: 28,
      guidance_scale: 3.5,
      num_images: 1
    })
  });
  const result = await res.json();
  if (!result.images || !result.images[0]) throw new Error('No image in fal response: ' + JSON.stringify(result));
  return result.images[0].url;
}

async function urlToBase64(url) {
  const res = await fetch(url);
  const blob = await res.blob();
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });
}

async function callFal(artistKey, base64Image) {
  const keyword = state.keyword ? `"${state.keyword}", ` : '';

  // ── PASS 1: Gesture + Material ────────────────────────────
  const prompt1 = keyword + (ARTIST_PROMPTS_P1[artistKey] || ARTIST_PROMPTS_P1.bourgeois);
  const strength1 = ARTIST_STRENGTH_P1[artistKey] ?? 0.65;
  console.log(`[Pass 1] ${artistKey} | strength: ${strength1}`);
  const pass1Url = await falImgToImg(base64Image, prompt1, strength1);

  // ── PASS 2: Finish (artist name + color + motifs) ─────────
  const pass1Base64 = await urlToBase64(pass1Url);
  const prompt2 = keyword + (ARTIST_PROMPTS_P2[artistKey] || ARTIST_PROMPTS_P2.bourgeois);
  const strength2 = ARTIST_STRENGTH_P2[artistKey] ?? 0.72;
  console.log(`[Pass 2] ${artistKey} | strength: ${strength2}`);
  const pass2Url = await falImgToImg(pass1Base64, prompt2, strength2);

  return pass2Url;
}

      function collectLeaves(x, y, len, angle, depth) {
        if (depth === 0 || len < 6) { leafPos.push([x,y]); return; }
        const ex = x + Math.cos(angle)*len, ey = y + Math.sin(angle)*len;
        collectLeaves(ex, ey, len*0.66, angle-0.42, depth-1);
        collectLeaves(ex, ey, len*0.66, angle+0.42, depth-1);
      }
      collectLeaves(w*0.5, h*0.5, h*0.18, -Math.PI/2, 7);
      leafPos.forEach(([lx,ly]) => {
        ctx.beginPath(); ctx.arc(lx, ly, 5, 0, Math.PI*2);
        ctx.strokeStyle = '#d0ccc4'; ctx.lineWidth = 0.6; ctx.stroke();
      });

        ctx.strokeStyle = '#ccc8c0'; ctx.lineWidth = 0.7; ctx.stroke();
      }
      // A path through the forest
      ctx.beginPath();
      ctx.moveTo(w*0.42, h*0.88);
      ctx.bezierCurveTo(w*0.44, h*0.76, w*0.46, h*0.64, w*0.48, h*0.54);
      ctx.moveTo(w*0.58, h*0.88);
      ctx.bezierCurveTo(w*0.56, h*0.76, w*0.54, h*0.64, w*0.52, h*0.54);
      ctx.strokeStyle = '#d0ccc4'; ctx.lineWidth = 0.8; ctx.stroke();
      // Trees — varied heights, detailed fir
      const drawFir = (tx, ty, ht, lw) => {
        // Trunk
        ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(tx, ty-ht*0.35);
        ctx.strokeStyle = '#bfbbb3'; ctx.lineWidth = lw+0.4; ctx.stroke();
        // 4 branch tiers
        for (let l = 0; l < 4; l++) {
          const ly = ty - ht*(0.3 + l*0.2), brw = ht*(0.38 - l*0.07);
          ctx.beginPath();
          ctx.moveTo(tx-brw, ly+ht*0.06); ctx.lineTo(tx, ly-ht*0.1); ctx.lineTo(tx+brw, ly+ht*0.06);
          ctx.strokeStyle = '#c4c0b8'; ctx.lineWidth = lw; ctx.stroke();
          // Branch detail lines
          ctx.beginPath();
          ctx.moveTo(tx-brw*0.5, ly+ht*0.02); ctx.lineTo(tx-brw*0.8, ly+ht*0.08);
          ctx.moveTo(tx+brw*0.5, ly+ht*0.02); ctx.lineTo(tx+brw*0.8, ly+ht*0.08);
          ctx.strokeStyle = '#d0ccc4'; ctx.lineWidth = 0.5; ctx.stroke();
        }
      };
      [[0.1,0.88,h*0.52,1],[0.22,0.88,h*0.64,1.1],[0.36,0.88,h*0.44,0.9],[0.64,0.88,h*0.48,1],[0.76,0.88,h*0.68,1.1],[0.9,0.88,h*0.54,0.9]].forEach(([tx,ty,ht,lw]) => drawFir(w*tx, h*ty, ht, lw));
      // Background foliage haze — a few rounded canopy hints
      [[0.3,0.38,22],[0.5,0.32,18],[0.68,0.4,20]].forEach(([cx,cy,r]) => {
        ctx.beginPath(); ctx.arc(w*cx, h*cy, r, Math.PI, 0);
        ctx.strokeStyle = '#d4d0c8'; ctx.lineWidth = 0.6; ctx.stroke();

    }
  ],
  sea: [
    (ctx, w, h) => {

      ctx.beginPath(); ctx.moveTo(w*0.04, h*0.44); ctx.lineTo(w*0.96, h*0.44);

      // Distant waves — small, close together
      for (let i = 0; i < 3; i++) {

      for (let i = 0; i < 60; i++) {

        ctx.strokeStyle = '#d0ccc4'; ctx.lineWidth = 0.6; ctx.stroke();
      });

      ctx.beginPath(); ctx.lineWidth = 2.5;
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(-Math.PI/2 + 1.2)*r*0.58, cy + Math.sin(-Math.PI/2 + 1.2)*r*0.58);
      ctx.strokeStyle = '#b0aca4'; ctx.lineCap = 'round'; ctx.stroke(); ctx.lineCap = 'butt';
      // Minute hand — thin, long
      ctx.beginPath(); ctx.lineWidth = 1.4;
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + Math.cos(-Math.PI/2 + 3.8)*r*0.84, cy + Math.sin(-Math.PI/2 + 3.8)*r*0.84);
      ctx.strokeStyle = '#bab6ae'; ctx.stroke();
      // Second hand — fine line, different angle
      ctx.beginPath(); ctx.lineWidth = 0.8;
      ctx.moveTo(cx - Math.cos(-Math.PI/2 + 2.1)*r*0.22, cy - Math.sin(-Math.PI/2 + 2.1)*r*0.22);
      ctx.lineTo(cx + Math.cos(-Math.PI/2 + 2.1)*r*0.9, cy + Math.sin(-Math.PI/2 + 2.1)*r*0.9);
      ctx.strokeStyle = '#c8c4bc'; ctx.stroke();

  home: [

      ctx.moveTo(w*0.43, h*0.86); ctx.lineTo(w*0.43, h*0.66);
      ctx.arc(w*0.5, h*0.66, w*0.07, Math.PI, 0);
      ctx.lineTo(w*0.57, h*0.86);
      ctx.strokeStyle = '#c4c0b8'; ctx.lineWidth = 1.4; ctx.stroke();
      // Door knob
      ctx.beginPath(); ctx.arc(w*0.54, h*0.76, 2.5, 0, Math.PI*2);
      ctx.fillStyle = '#c8c4bc'; ctx.fill();
      // Left window
      ctx.beginPath(); ctx.rect(w*0.24, h*0.54, w*0.14, h*0.14);
      ctx.strokeStyle = '#cac6be'; ctx.lineWidth = 1.2; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w*0.31, h*0.54); ctx.lineTo(w*0.31, h*0.68);
      ctx.moveTo(w*0.24, h*0.61); ctx.lineTo(w*0.38, h*0.61);
      ctx.strokeStyle = '#d4d0c8'; ctx.lineWidth = 0.6; ctx.stroke();
      // Right window
      ctx.beginPath(); ctx.rect(w*0.62, h*0.54, w*0.14, h*0.14);
      ctx.strokeStyle = '#cac6be'; ctx.lineWidth = 1.2; ctx.stroke();
      ctx.beginPath(); ctx.moveTo(w*0.69, h*0.54); ctx.lineTo(w*0.69, h*0.68);
      ctx.moveTo(w*0.62, h*0.61); ctx.lineTo(w*0.76, h*0.61);
      ctx.strokeStyle = '#d4d0c8'; ctx.lineWidth = 0.6; ctx.stroke();
      // Roof shingle lines
      for (let i = 1; i < 5; i++) {

        ctx.lineTo(w*(0.82 - t*(0.82-0.5)), h*(0.86 - t*(0.86-0.48)));

      ctx.beginPath();
      ctx.moveTo(w*0.43, h*0.86); ctx.bezierCurveTo(w*0.4, h*0.9, w*0.38, h*0.92, w*0.34, h*0.94);
