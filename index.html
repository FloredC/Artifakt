// fallback motif — double Fibonacci spiral with golden-ratio geometry
const DEFAULT_MOTIF = (ctx, w, h) => {
  const cx = w*0.5, cy = h*0.44;
  // Outer spiral
  ctx.beginPath(); ctx.strokeStyle = '#c4c0b8'; ctx.lineWidth = 1.4;
  for (let t = 0; t < Math.PI*9; t += 0.06) {
    const r = t * Math.min(w,h) * 0.016;
    const x = cx + Math.cos(t)*r, y = cy + Math.sin(t)*r*0.8;
    t < 0.06 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();
  // Second spiral offset — inward
  ctx.beginPath(); ctx.strokeStyle = '#d0ccc4'; ctx.lineWidth = 0.7;
  for (let t = 0; t < Math.PI*8; t += 0.06) {
    const r = t * Math.min(w,h) * 0.016 - 6;
    if (r < 0) continue;
    const x = cx + Math.cos(t)*r, y = cy + Math.sin(t)*r*0.8;
    t < 0.36 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }
  ctx.stroke();
  // Golden ratio rectangles — nested
  let gx = cx-18, gy = cy-18, gs = 36;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath(); ctx.rect(gx, gy, gs, gs);
    ctx.strokeStyle = '#d4d0c8'; ctx.lineWidth = 0.5; ctx.stroke();
    const ng = gs * 0.618;
    gx += gs - ng; gy += (gs-ng)*0.5; gs = ng;
  }
  // Center dot
  ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2);
  ctx.fillStyle = '#c0bcb4'; ctx.fill();
};

function getMotifs(keyword) {
  const key = keyword.toLowerCase().trim();
  if (MOTIFS[key]) return MOTIFS[key];
  // partial match — e.g. "mountains" → "mountain"
  for (const k of Object.keys(MOTIFS)) {
    if (key.includes(k) || k.includes(key)) return MOTIFS[k];
  }
  return [DEFAULT_MOTIF];
}

/* ══════════════════════════════════════════════════════════
   ARTIST LIBRARY  — each artist has a unique render function
══════════════════════════════════════════════════════════ */

// ── Shared drawing utility ────────────────────────────────
function drawSmoothPath(ctx, pts) {
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const mx = (pts[i].x + pts[i + 1].x) / 2;
    const my = (pts[i].y + pts[i + 1].y) / 2;
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
  }
  ctx.lineTo(pts.at(-1).x, pts.at(-1).y);
}

function paperGrain(ctx, w, h, alpha = 0.03, dark = false) {
  for (let i = 0; i < 3500; i++) {
    const a = Math.random() * alpha;
    ctx.fillStyle = dark ? `rgba(0,0,0,${a})` : `rgba(180,160,120,${a})`;
    ctx.fillRect(Math.random() * w, Math.random() * h, Math.random() < 0.5 ? 1 : 2, 1);
  }
}

// ── Artist render functions ───────────────────────────────

function renderMerian(ctx, w, h, strokes, motifFn) {
  // Warm parchment background
  const bg = ctx.createLinearGradient(0, 0, w, h);
  bg.addColorStop(0, '#f4eccc');
  bg.addColorStop(0.5, '#ede3bc');
  bg.addColorStop(1, '#e8dab0');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);
  paperGrain(ctx, w, h, 0.025);

  // Faint pencil ghost of scaffold
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#5a3a10';
  ctx.lineWidth = 0.8;
  motifFn(ctx, w, h);
  ctx.restore();

  for (const stroke of strokes) {
    if (stroke.points.length < 2) continue;

    // Wide watercolour wash under the ink
    ctx.save();
    const washColors = ['#7aaa5a','#c87040','#d4a030','#5a8870','#c05060'];
    ctx.strokeStyle = washColors[Math.floor(Math.random() * washColors.length)];
    ctx.lineWidth = 14 + Math.random() * 10;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.13;
    ctx.filter = 'blur(5px)';
    drawSmoothPath(ctx, stroke.points);
    ctx.stroke();
    ctx.restore();

    // Second slightly offset wash for bleed effect
    ctx.save();
    ctx.strokeStyle = '#8ab060';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.08;
    ctx.filter = 'blur(8px)';
    const shifted = stroke.points.map(p => ({ x: p.x + (Math.random()-0.5)*6, y: p.y + (Math.random()-0.5)*6 }));
    drawSmoothPath(ctx, shifted);
    ctx.stroke();
    ctx.restore();

    // Fine ink line on top
    ctx.save();
    ctx.strokeStyle = '#1c0e04';
    ctx.lineWidth = 1.1;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.88;
    drawSmoothPath(ctx, stroke.points);
    ctx.stroke();
    ctx.restore();

    // Botanical flourishes — small leaves at intervals along stroke
    const step = Math.max(6, Math.floor(stroke.points.length / 7));
    for (let i = step; i < stroke.points.length - 1; i += step) {
      const p = stroke.points[i];
      const next = stroke.points[Math.min(i + 3, stroke.points.length - 1)];
      const angle = Math.atan2(next.y - p.y, next.x - p.x) + Math.PI / 2 + (Math.random() - 0.5) * 0.8;
      const size = 7 + Math.random() * 9;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = ['#6a9c40','#c06030','#d09820'][Math.floor(Math.random()*3)];
      ctx.strokeStyle = '#1c0e04';
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.bezierCurveTo(size * 0.55, -size * 0.4, size * 0.55, size * 0.4, 0, size * 0.9);
      ctx.bezierCurveTo(-size * 0.55, size * 0.4, -size * 0.55, -size * 0.4, 0, -size);
      ctx.fill();
      ctx.stroke();
      // midrib
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(0, size * 0.9);
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = '#1c0e04';
      ctx.lineWidth = 0.4;
      ctx.stroke();
      ctx.restore();
    }

    // Small cross-hatching marks near stroke endpoints
    const ep = stroke.points.at(-1);
    for (let d = 0; d < 5; d++) {
      ctx.save();
      ctx.globalAlpha = 0.2;
      ctx.strokeStyle = '#3a2010';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(ep.x + d * 3, ep.y - 4);
      ctx.lineTo(ep.x + d * 3 - 4, ep.y + 4);
      ctx.stroke();
      ctx.restore();
    }
  }

  // Signature
  ctx.save();
  ctx.globalAlpha = 0.45;
  ctx.fillStyle = '#3a2010';
  ctx.font = 'italic 9px Georgia, serif';
  ctx.fillText('M.S. Merian', 14, h - 14);
  ctx.restore();
}

function renderAfKlint(ctx, w, h, strokes, motifFn) {
  // Clean off-white background
  ctx.fillStyle = '#f2ede4';
  ctx.fillRect(0, 0, w, h);
  paperGrain(ctx, w, h, 0.012);

  // Ghost geometric grid
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.strokeStyle = '#8060a0';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < w; x += w / 8) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }
  for (let y = 0; y < h; y += h / 8) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  ctx.restore();

  // Ghost scaffold
  ctx.save();
  ctx.globalAlpha = 0.1;
  ctx.strokeStyle = '#6040a0';
  ctx.lineWidth = 1;
  motifFn(ctx, w, h);
  ctx.restore();

  for (const stroke of strokes) {
    if (stroke.points.length < 2) continue;

    // Bold colour fill — swelling teardrop blobs along path
    const blobColors = ['#e8b820','#c83880','#4870c0','#40a060','#d04020'];
    const blobColor = blobColors[Math.floor(Math.random() * blobColors.length)];
    const step = Math.max(4, Math.floor(stroke.points.length / 12));
    for (let i = 0; i < stroke.points.length; i += step) {
      const p = stroke.points[i];
      const r = 14 + Math.random() * 18;
      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = blobColor;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, r * 1.3, r, Math.random() * Math.PI, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Strong black outline stroke
    ctx.save();
    ctx.strokeStyle = '#1a0a28';
    ctx.lineWidth = 3.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.9;
    drawSmoothPath(ctx, stroke.points);
    ctx.stroke();
    ctx.restore();

    // White highlight stroke offset slightly
    ctx.save();
    ctx.strokeStyle = '#f0e8f8';
    ctx.lineWidth = 1;
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.5;
    const offset = stroke.points.map(p => ({ x: p.x - 1.5, y: p.y - 1.5 }));
    drawSmoothPath(ctx, offset);
    ctx.stroke();
    ctx.restore();

    // Concentric circle at midpoint of stroke
    const mid = stroke.points[Math.floor(stroke.points.length / 2)];
    for (let r = 8; r <= 40; r += 10) {
      ctx.save();
      ctx.globalAlpha = 0.08;
      ctx.strokeStyle = blobColor;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(mid.x, mid.y, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Spiral at stroke start
    const sp = stroke.points[0];
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.strokeStyle = '#8050b0';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    for (let t = 0; t < Math.PI * 4; t += 0.15) {
      const sr = t * 3;
      const sx = sp.x + Math.cos(t) * sr;
      const sy = sp.y + Math.sin(t) * sr;
      t === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
    }
    ctx.stroke();
    ctx.restore();
  }

  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#5030a0';
  ctx.font = 'italic 9px Georgia, serif';
  ctx.fillText('H. af Klint', 14, h - 14);
  ctx.restore();
}

function renderBourgeois(ctx, w, h, strokes, motifFn) {
  // Raw dark surface — charcoal
  ctx.fillStyle = '#141010';
  ctx.fillRect(0, 0, w, h);
  // Subtle warm grain
  for (let i = 0; i < 4000; i++) {
    ctx.fillStyle = `rgba(80,40,20,${Math.random() * 0.04})`;
    ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
  }

  // Web structure — radiating from centre
  const cx = w * 0.5, cy = h * 0.42;
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#c8b090';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * w * 0.5, cy + Math.sin(a) * h * 0.5);
    ctx.stroke();
  }
  for (let r = 20; r < Math.min(w, h) * 0.45; r += 22) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();

  // Ghost scaffold
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = '#c8a080';
  motifFn(ctx, w, h);
  ctx.restore();

  for (const stroke of strokes) {
    if (stroke.points.length < 2) continue;

    // Blurry red glow underneath
    ctx.save();
    ctx.strokeStyle = '#c02010';
    ctx.lineWidth = 10;
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.2;
    ctx.filter = 'blur(7px)';
    drawSmoothPath(ctx, stroke.points);
    ctx.stroke();
    ctx.restore();

    // Main stroke in heavy charcoal/red
    ctx.save();
    ctx.strokeStyle = '#d02818';
    ctx.lineWidth = 2.8;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.85;
    drawSmoothPath(ctx, stroke.points);
    ctx.stroke();
    ctx.restore();

    // Nervous parallel scratches beside the main stroke
    for (let pass = -1; pass <= 1; pass += 2) {
      const jitter = stroke.points.map(p => ({
        x: p.x + pass * (3 + Math.random() * 4),
        y: p.y + (Math.random() - 0.5) * 3
      }));
      ctx.save();
      ctx.strokeStyle = '#e0c8a0';
      ctx.lineWidth = 0.4 + Math.random() * 0.4;
      ctx.globalAlpha = 0.2 + Math.random() * 0.15;
      ctx.lineCap = 'round';
      drawSmoothPath(ctx, jitter);
      ctx.stroke();
      ctx.restore();
    }

    // Repetitive anxious dots along path
    const dotStep = Math.max(3, Math.floor(stroke.points.length / 20));
    for (let i = 0; i < stroke.points.length; i += dotStep) {
      const p = stroke.points[i];
      ctx.save();
      ctx.fillStyle = Math.random() < 0.4 ? '#d03020' : '#e0c8a0';
      ctx.globalAlpha = 0.55;
      ctx.beginPath();
      ctx.arc(p.x + (Math.random()-0.5)*5, p.y + (Math.random()-0.5)*5, 1 + Math.random(), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#c09070';
  ctx.font = 'italic 9px Georgia, serif';
  ctx.fillText('L. Bourgeois', 14, h - 14);
  ctx.restore();
}

function renderOKeeffe(ctx, w, h, strokes, motifFn) {
  // Warm ivory-cream
  const bg = ctx.createRadialGradient(w * 0.5, h * 0.4, 10, w * 0.5, h * 0.4, Math.max(w, h) * 0.7);
  bg.addColorStop(0, '#fdf0e0');
  bg.addColorStop(1, '#e8d4b8');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);
  paperGrain(ctx, w, h, 0.015);

  // Ghost scaffold
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = '#c04060';
  motifFn(ctx, w, h);
  ctx.restore();

  for (const stroke of strokes) {
    if (stroke.points.length < 2) continue;

    // Large luminous colour halos — petals swelling from the path
    const petalColors = [
      ['#e86040','#f0a080'],
      ['#c05080','#e090b0'],
      ['#a04060','#d080a0'],
      ['#d07020','#f0b060'],
    ];
    const [innerCol, outerCol] = petalColors[Math.floor(Math.random() * petalColors.length)];

    const haloStep = Math.max(5, Math.floor(stroke.points.length / 8));
    for (let i = 0; i < stroke.points.length; i += haloStep) {
      const p = stroke.points[i];
      const next = stroke.points[Math.min(i + haloStep, stroke.points.length - 1)];
      const angle = Math.atan2(next.y - p.y, next.x - p.x);
      const rw = 30 + Math.random() * 40;
      const rh = 16 + Math.random() * 24;

      const grad = ctx.createRadialGradient(p.x, p.y, 2, p.x, p.y, rw);
      grad.addColorStop(0, innerCol + 'cc');
      grad.addColorStop(0.5, outerCol + '55');
      grad.addColorStop(1, outerCol + '00');

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(angle);
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(0, 0, rw, rh, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    // Thin, flowing stroke
    ctx.save();
    ctx.strokeStyle = '#8a2030';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.7;
    drawSmoothPath(ctx, stroke.points);
    ctx.stroke();
    ctx.restore();
  }

  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#6a2030';
  ctx.font = 'italic 9px Georgia, serif';
  ctx.fillText("G. O'Keeffe", 14, h - 14);
  ctx.restore();
}

function renderKusama(ctx, w, h, strokes, motifFn) {
  // Bold red
  ctx.fillStyle = '#c01010';
  ctx.fillRect(0, 0, w, h);

  // Field of white polka dots
  for (let i = 0; i < 160; i++) {
    const r = 4 + Math.random() * 12;
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#f8f0e0';
    ctx.beginPath();
    ctx.arc(Math.random() * w, Math.random() * h, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Ghost scaffold
  ctx.save();
  ctx.globalAlpha = 0.15;
  ctx.strokeStyle = '#f8f0e0';
  motifFn(ctx, w, h);
  ctx.restore();

  for (const stroke of strokes) {
    if (stroke.points.length < 2) continue;

    // Bold white stroke
    ctx.save();
    ctx.strokeStyle = '#f8f4e8';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.95;
    drawSmoothPath(ctx, stroke.points);
    ctx.stroke();
    ctx.restore();

    // Red dots punched out along the white stroke
    const dotStep = Math.max(3, Math.floor(stroke.points.length / 18));
    for (let i = 0; i < stroke.points.length; i += dotStep) {
      const p = stroke.points[i];
      ctx.save();
      ctx.fillStyle = '#c01010';
      ctx.globalAlpha = 1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 3 + Math.random() * 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  ctx.save();
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = '#f8f0e0';
  ctx.font = 'italic 9px Georgia, serif';
  ctx.fillText('Y. Kusama', 14, h - 14);
  ctx.restore();
}

function renderVaro(ctx, w, h, strokes, motifFn) {
  // Amber parchment — slightly darker
  const bg = ctx.createLinearGradient(0, 0, w, h);
  bg.addColorStop(0, '#e8d898');
  bg.addColorStop(1, '#d4c070');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);
  paperGrain(ctx, w, h, 0.03);

  // Geometric architectural grid — her characteristic mechanical world
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = '#5a4010';
  ctx.lineWidth = 0.5;
  const cols = 10, rows = 14;
  for (let c = 0; c <= cols; c++) {
    ctx.beginPath();
    ctx.moveTo((c / cols) * w, 0);
    ctx.lineTo((c / cols) * w * 0.9 + w * 0.05, h);
    ctx.stroke();
  }
  for (let r = 0; r <= rows; r++) {
    const y = (r / rows) * h;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(w, y + Math.sin(r * 0.5) * 6);
    ctx.stroke();
  }
  ctx.restore();

  // Ghost scaffold
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#6a4820';
  motifFn(ctx, w, h);
  ctx.restore();

  for (const stroke of strokes) {
    if (stroke.points.length < 2) continue;

    // Amber wash
    ctx.save();
    ctx.strokeStyle = '#c09030';
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    ctx.globalAlpha = 0.12;
    ctx.filter = 'blur(4px)';
    drawSmoothPath(ctx, stroke.points);
    ctx.stroke();
    ctx.restore();

    // Fine ink outline
    ctx.save();
    ctx.strokeStyle = '#2a1808';
    ctx.lineWidth = 1.2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.85;
    drawSmoothPath(ctx, stroke.points);
    ctx.stroke();
    ctx.restore();

    // Cross-hatch detail inside stroke area
    const step = Math.max(8, Math.floor(stroke.points.length / 10));
    for (let i = step; i < stroke.points.length - 1; i += step) {
      const p = stroke.points[i];
      const next = stroke.points[i + 1];
      const a = Math.atan2(next.y - p.y, next.x - p.x);
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(a + Math.PI / 2);
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = '#3a2010';
      ctx.lineWidth = 0.4;
      for (let d = -6; d <= 6; d += 2.5) {
        ctx.beginPath();
        ctx.moveTo(d, -5);
        ctx.lineTo(d - 3, 5);
        ctx.stroke();
      }
      ctx.restore();
    }

    // Tiny clockwork circles at key points
    const circStep = Math.max(10, Math.floor(stroke.points.length / 5));
    for (let i = 0; i < stroke.points.length; i += circStep) {
      const p = stroke.points[i];
      for (let r = 4; r <= 12; r += 4) {
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.strokeStyle = '#6a4010';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }
  }

  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#3a2008';
  ctx.font = 'italic 9px Georgia, serif';
  ctx.fillText('R. Varo', 14, h - 14);
  ctx.restore();
}

function renderKrasner(ctx, w, h, strokes, motifFn) {
  // Dark forest green ground
  ctx.fillStyle = '#0c1408';
  ctx.fillRect(0, 0, w, h);
  for (let i = 0; i < 3000; i++) {
    ctx.fillStyle = `rgba(40,80,20,${Math.random() * 0.04})`;
    ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
  }

  ctx.save();
  ctx.globalAlpha = 0.07;
  ctx.strokeStyle = '#e0c870';
  motifFn(ctx, w, h);
  ctx.restore();

  const gestureColors = ['#c84030','#e0c040','#2860a0','#50a040','#e08030'];
  for (const stroke of strokes) {
    if (stroke.points.length < 2) continue;

    // Each stroke gets its own gestural colour — painterly
    const col = gestureColors[Math.floor(Math.random() * gestureColors.length)];

    // Heavy impasto-like blob underneath
    ctx.save();
    ctx.strokeStyle = col;
    ctx.lineWidth = 18 + Math.random() * 12;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.12;
    ctx.filter = 'blur(4px)';
    drawSmoothPath(ctx, stroke.points);
    ctx.stroke();
    ctx.restore();

    // Main gestural mark
    ctx.save();
    ctx.strokeStyle = col;
    ctx.lineWidth = 4 + Math.random() * 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.globalAlpha = 0.8;
    drawSmoothPath(ctx, stroke.points);
    ctx.stroke();
    ctx.restore();

    // Aggressive palette knife scrape — thin bright streak
    const shifted = stroke.points.map(p => ({ x: p.x + 2, y: p.y - 2 }));
    ctx.save();
    ctx.strokeStyle = '#f0e8b0';
    ctx.lineWidth = 0.8;
    ctx.globalAlpha = 0.4;
    drawSmoothPath(ctx, shifted);
    ctx.stroke();
    ctx.restore();
  }

  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = '#c09050';
  ctx.font = 'italic 9px Georgia, serif';
  ctx.fillText('L. Krasner', 14, h - 14);
  ctx.restore();
}

let drawCtx;

function resizeDrawCanvas() {
  const rect = canvasArea.getBoundingClientRect();
  drawCanvas.width  = rect.width  * devicePixelRatio;
  drawCanvas.height = rect.height * devicePixelRatio;
  drawCanvas.style.width  = rect.width  + 'px';
  drawCanvas.style.height = rect.height + 'px';
  drawCtx = drawCanvas.getContext('2d');
  drawCtx.scale(devicePixelRatio, devicePixelRatio);
  if (typeof resetZoom === 'function') resetZoom(false);
  redrawCanvas();
}

function redrawCanvas() {
  if (!drawCtx) return;
  const w = drawCanvas.width  / devicePixelRatio;
  const h = drawCanvas.height / devicePixelRatio;
  drawCtx.clearRect(0, 0, w, h);

  // Canvas stays white — no placeholder motif drawn

  // replay user strokes
  for (const stroke of state.strokes) {
    if (stroke.points.length < 2) continue;
    drawCtx.beginPath();
    drawCtx.moveTo(stroke.points[0].x, stroke.points[0].y);
    for (let i = 1; i < stroke.points.length; i++) {
      const p0 = stroke.points[i - 1];
      const p1 = stroke.points[i];
      drawCtx.lineTo((p0.x + p1.x) / 2, (p0.y + p1.y) / 2);
    }
    drawCtx.lineTo(stroke.points.at(-1).x, stroke.points.at(-1).y);
    drawCtx.strokeStyle = '#1a1a1a';
    drawCtx.lineWidth = 2.2;
    drawCtx.lineCap = 'round';
    drawCtx.lineJoin = 'round';
    drawCtx.stroke();
  }
}

function makeCardLabel(keyword) {
  const w = keyword.trim().toLowerCase();
  if (w.endsWith('ing') && w.length > 4) {
    const stem = w.slice(0, -3);
    const last = stem[stem.length - 1];
    const prev = stem[stem.length - 2];
    const vowels = 'aeiou';
    let agent;
    if (last === prev && !vowels.includes(last)) {
      // -ing form already shows the doubled consonant (swimming→swimm, running→runn):
      // keep both → swimmer, runner, sitter
      agent = stem + 'er';
    } else {
      // single trailing consonant: just add -er.
      // Correctly-spelled verbs that double (sit, run, swim) are caught above; the rest
      // never double in their agent form (writing→writer, reading→reader, drawing→drawer).
      agent = stem.endsWith('e') ? stem + 'r' : stem + 'er';
    }
    return 'THE ' + agent.toUpperCase();
  }
  return 'THE ' + w.toUpperCase();
}

function confirmKeyword() {
  const kw = keywordInput.value.trim();
  if (!kw) return;
  const changed = kw !== state.keyword;
  state.keyword = kw;
  if (changed) {
    state.strokes = [];
    state.hasDrawn = false;
    state.motifIndex = 0;
  }
  setS1State('trace');
  nextBtn.disabled = !state.hasDrawn;

  // Kick off AI scaffold generation for any word
  generateScaffold(kw);
}

regenBtn.addEventListener('click', () => {

/* ── Pinch-zoom + pan (view-only CSS transform on the canvas layer) ──
   One finger draws; two fingers pinch to zoom and pan. The zoom layer is
   transformed visually, so strokes stay in canvas coordinates and the
   final-card export is unaffected. */
const zoomLayer = document.getElementById('zoom-layer');
const zoom = { scale: 1, x: 0, y: 0 };
const ZOOM_MIN = 1, ZOOM_MAX = 4;
let pinch = null;
let lastTapTime = 0;

function applyZoom() {
  zoomLayer.style.transform = `translate(${zoom.x}px, ${zoom.y}px) scale(${zoom.scale})`;
}
function clampPan() {
  const rect = canvasArea.getBoundingClientRect();
  zoom.x = Math.min(0, Math.max(rect.width  - rect.width  * zoom.scale, zoom.x));
  zoom.y = Math.min(0, Math.max(rect.height - rect.height * zoom.scale, zoom.y));
}
function resetZoom(animate) {
  zoom.scale = 1; zoom.x = 0; zoom.y = 0;
  if (animate) {
    zoomLayer.classList.add('snapping');
    setTimeout(() => zoomLayer.classList.remove('snapping'), 220);
  }
  applyZoom();
}
function touchDist(a, b) {
  return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
}
function beginPinch(e) {
  state.currentStroke = null; // abandon any in-progress stroke
  const [t0, t1] = e.touches;
  pinch = {
    startDist:  touchDist(t0, t1),
    startScale: zoom.scale,
    startX: zoom.x, startY: zoom.y,
    startMidX: (t0.clientX + t1.clientX) / 2,
    startMidY: (t0.clientY + t1.clientY) / 2,
  };
}
function updatePinch(e) {
  const [t0, t1] = e.touches;
  const rect = canvasArea.getBoundingClientRect();
  let s = pinch.startScale * (touchDist(t0, t1) / pinch.startDist);
  s = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, s));
  // content point under the gesture's starting midpoint
  const cx = (pinch.startMidX - rect.left - pinch.startX) / pinch.startScale;
  const cy = (pinch.startMidY - rect.top  - pinch.startY) / pinch.startScale;
  // keep that point under the current midpoint
  const midX = (t0.clientX + t1.clientX) / 2 - rect.left;
  const midY = (t0.clientY + t1.clientY) / 2 - rect.top;
  zoom.scale = s;
  zoom.x = midX - cx * s;
  zoom.y = midY - cy * s;
  clampPan();
  applyZoom();
}

/* ── Drawing ──────────────────────────────────────────── */
function getPos(e) {
  const rect = canvasArea.getBoundingClientRect();
  const src  = e.touches ? e.touches[0] : e;
  return {
    x: ((src.clientX - rect.left) - zoom.x) / zoom.scale,
    y: ((src.clientY - rect.top)  - zoom.y) / zoom.scale,
  };
}

function smoothPoints(pts) {
  if (pts.length < 3) return pts;
  const out = [pts[0]];
  for (let i = 1; i < pts.length - 1; i++) {
    out.push({
      x: (pts[i - 1].x + pts[i].x + pts[i + 1].x) / 3,
      y: (pts[i - 1].y + pts[i].y + pts[i + 1].y) / 3,
    });
  }
  out.push(pts.at(-1));
  return out;
}

function startDraw(e) {
  if (screen1El.classList.contains('state-intent')) return;
  // two fingers → pinch/pan, not draw
  if (e.touches && e.touches.length >= 2) {
    e.preventDefault();
    beginPinch(e);
    return;
  }
  e.preventDefault();
  // double-tap (while zoomed) snaps back to fit
  const now = Date.now();
  if (now - lastTapTime < 300 && zoom.scale > ZOOM_MIN + 0.01) {
    lastTapTime = 0;
    state.currentStroke = null;
    resetZoom(true);
    return;
  }
  lastTapTime = now;
  // new stroke = new sketch session, clear AI cache
  Object.keys(artistImageCache).forEach(k => delete artistImageCache[k]);
  const pos = getPos(e);
  state.currentStroke = { points: [pos] };
  canvasHint.style.opacity = '0';
}

function moveDraw(e) {
  // pinch in progress → zoom/pan
  if (pinch && e.touches && e.touches.length >= 2) {
    e.preventDefault();
    updatePinch(e);
    return;
  }
  e.preventDefault();
  if (!state.currentStroke) return;
  state.currentStroke.points.push(getPos(e));

  // live render current stroke
  const pts = state.currentStroke.points;
  if (pts.length >= 2) {
    drawCtx.beginPath();
    drawCtx.moveTo(pts.at(-2).x, pts.at(-2).y);
    drawCtx.lineTo(pts.at(-1).x, pts.at(-1).y);
    drawCtx.strokeStyle = '#1a1a1a';
    drawCtx.lineWidth = 2.2;
    drawCtx.lineCap = 'round';
    drawCtx.lineJoin = 'round';
    drawCtx.stroke();
  }
}

function endDraw(e) {
  // ending a pinch — don't resume drawing until fingers fully lift
  if (pinch) {
    e.preventDefault();
    if (!e.touches || e.touches.length < 2) {
      pinch = null;
      if (zoom.scale <= ZOOM_MIN + 0.01) resetZoom(true);
    }
    return;
  }
  e.preventDefault();
  if (!state.currentStroke) return;
  state.currentStroke.points = smoothPoints(state.currentStroke.points);
  state.strokes.push(state.currentStroke);
  state.currentStroke = null;
  state.hasDrawn = true;
  nextBtn.disabled = false;
  redrawCanvas();
}

drawCanvas.addEventListener('mousedown',  startDraw);
drawCanvas.addEventListener('mousemove',  moveDraw);
drawCanvas.addEventListener('mouseup',    endDraw);
drawCanvas.addEventListener('mouseleave', endDraw);
drawCanvas.addEventListener('touchstart', startDraw, { passive: false });
drawCanvas.addEventListener('touchmove',  moveDraw,  { passive: false });
drawCanvas.addEventListener('touchend',   endDraw,   { passive: false });

/* ── Spinning card — one-time loader on "Choose your artist" ──
   Spins the traced sketch in 3D until the first artwork loads,
   then settles to reveal Screen 2. (Avatar spinner handles later switches.) */
let cardSpinActive = false;
let cardSpinTimer  = null;
// Render the user's traced strokes to a transparent PNG (same look as redrawCanvas).
// Strokes-only canvas → toDataURL is CORS-safe (no remote image touched).
function getStrokesPNG() {
  if (!drawCanvas || !state.strokes || !state.strokes.length) return '';
  const w = drawCanvas.width  / devicePixelRatio;
  const h = drawCanvas.height / devicePixelRatio;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  for (const stroke of state.strokes) {
    if (stroke.points.length < 2) continue;
    ctx.beginPath();
    ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
    for (let i = 1; i < stroke.points.length; i++) {
      const p0 = stroke.points[i - 1], p1 = stroke.points[i];
      ctx.lineTo((p0.x + p1.x) / 2, (p0.y + p1.y) / 2);
    }
    ctx.lineTo(stroke.points.at(-1).x, stroke.points.at(-1).y);
    ctx.stroke();
  }
  return c.toDataURL('image/png');
}

function startCardSpin(imgSrc) {
  const cardSpin = document.getElementById('card-spin');
  if (!cardSpin) return;
  const strokesSrc = getStrokesPNG();
  const setImg = (id, src) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (src) { el.src = src; el.style.display = ''; }
    else { el.removeAttribute('src'); el.style.display = 'none'; }
  };
  setImg('card-spin-img', imgSrc);
  setImg('card-spin-img-back', imgSrc);
  setImg('card-spin-strokes', strokesSrc);
  setImg('card-spin-strokes-back', strokesSrc);
  cardSpinActive = true;
  cardSpin.classList.remove('settling');
  cardSpin.classList.add('show');
  clearTimeout(cardSpinTimer);
  cardSpinTimer = setTimeout(endCardSpin, 12000); // safety backstop — never spin forever
}
function endCardSpin() {
  if (!cardSpinActive) return;
  cardSpinActive = false;
  clearTimeout(cardSpinTimer);
  const cardSpin = document.getElementById('card-spin');
  if (!cardSpin) return;
  cardSpin.classList.add('settling');
  setTimeout(() => cardSpin.classList.remove('show', 'settling'), 340);
}

// Per-artist call IDs so parallel pre-generation doesn't cancel each other out
const artistCallIds = {};
let selectedCallId = 0; // tracks which artist the user is currently viewing
const artistImageCache = {}; // cache generated images per artist key

async function renderArtistStyle(index, isBackground = false) {
  const artists = getArtists();
  const artist  = artists[index];
  const w = styleCanvas.width  / devicePixelRatio;
  const h = styleCanvas.height / devicePixelRatio;

  const artistKey = Object.keys(ARTIST_DEFS).find(k => ARTIST_DEFS[k] === artist) || 'kusama';

  // Track which artist the user is actively viewing
  if (!isBackground) selectedCallId = index;

  // serve from cache instantly if already generated
  if (artistImageCache[artistKey]) {
    if (!isBackground) {
      replicateResultUrl = artistImageCache[artistKey];
      styleImg.src = artistImageCache[artistKey];
      styleImg.classList.add('visible');
      regenArtistBtn.classList.add('visible');
      if (cardSpinActive) endCardSpin();
    }
    return;
  }

  // Each artist has its own call counter to avoid cancelling parallel requests
  const callId = (artistCallIds[artistKey] = (artistCallIds[artistKey] || 0) + 1);

  if (!isBackground) {
    styleImg.classList.remove('visible');
    regenArtistBtn.classList.remove('visible');
    // During the one-time card spin, the card IS the loader — keep the avatar hidden.
    if (!cardSpinActive) {
      const spinnerImg = document.getElementById('artist-spinner-img');
      if (spinnerImg) spinnerImg.src = ARTIST_AVATARS[artistKey] || '';
      const spinnerLabel = document.getElementById('spinner-label');
      if (spinnerLabel) spinnerLabel.textContent = 'Jujing it up…';
      styleLoading.classList.add('show');
    }
    artistCards.style.pointerEvents = 'none';
    replicateResultUrl = null;
    styleCtx.clearRect(0, 0, styleCanvas.width, styleCanvas.height);
  }

  if (FAL_API_KEY) {
    try {
      const base64 = await getSketchBase64(artistKey);
      const imageUrl = await callFal(artistKey, base64);
      if (callId !== artistCallIds[artistKey]) return;
      artistImageCache[artistKey] = imageUrl;

      if (isBackground && selectedCallId !== index) return;

      replicateResultUrl = imageUrl;

      styleImg.onload = () => {
        styleImg.classList.add('visible');
        regenArtistBtn.classList.add('visible');
        styleLoading.classList.remove('show'); artistCards.style.pointerEvents = '';
        if (cardSpinActive) endCardSpin();
      };
      styleImg.onerror = () => {
        console.warn('Image load failed, falling back to canvas');
        styleImg.classList.remove('visible');
        regenArtistBtn.classList.remove('visible');
        applyArtistStyle(styleCtx, artist, w, h, state.strokes, state.motifIndex, state.keyword);
        styleLoading.classList.remove('show'); artistCards.style.pointerEvents = '';
        if (cardSpinActive) endCardSpin();
      };
      styleImg.src = imageUrl;
    } catch (err) {
      if (callId !== artistCallIds[artistKey]) return;
      console.warn('Replicate failed, falling back to canvas:', err);
      styleImg.classList.remove('visible');
      regenArtistBtn.classList.remove('visible');
      styleCtx.clearRect(0, 0, w, h);
      applyArtistStyle(styleCtx, artist, w, h, state.strokes, state.motifIndex, state.keyword);
      styleLoading.classList.remove('show'); artistCards.style.pointerEvents = '';
      if (cardSpinActive) endCardSpin();
    }
  } else {
    styleImg.classList.remove('visible');
    setTimeout(() => {
      styleCtx.clearRect(0, 0, w, h);
      applyArtistStyle(styleCtx, artist, w, h, state.strokes, state.motifIndex, state.keyword);
      styleLoading.classList.remove('show'); artistCards.style.pointerEvents = '';
      if (cardSpinActive) endCardSpin();
    }, 120);
  }
}

// Draw image contain-fitted (no bleed, no stretch), centered
function drawImageCover(ctx, img, w, h, alpha) {
  if (!img || !img.naturalWidth) return;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const scale = Math.min(w / iw, h / ih); // contain: never exceeds canvas bounds
  const dw = iw * scale, dh = ih * scale;
  const dx = (w - dw) / 2, dy = (h - dh) / 2;
  ctx.save();
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  ctx.drawImage(img, dx, dy, dw, dh);
  ctx.restore();
}

// True cover: fills the canvas, cropping the overflow. Used as a full-bleed
// backdrop so the letterbox gaps are filled with the image's own edges
// (e.g. black around a Kara Walker silhouette) — the whole drawing then sits
// on top via drawImageCover, so it's never cropped out.
function drawImageFill(ctx, img, w, h) {
  if (!img || !img.naturalWidth) return;
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const scale = Math.max(w / iw, h / ih);
  const dw = iw * scale, dh = ih * scale;
  const dx = (w - dw) / 2, dy = (h - dh) / 2;
  ctx.drawImage(img, dx, dy, dw, dh);
}

function drawCard(ctx, w, h, artistImg, scaffoldImg) {
  // 1. White background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);

  // 2. Scaffold at 28% opacity
  if (scaffoldImg && scaffoldImg.complete && scaffoldImg.naturalWidth) {
    drawImageCover(ctx, scaffoldImg, w, h, 0.28);
  }

  // 3. Artist image — full bleed: a cropped cover backdrop fills the canvas,
  //    then the whole image on top so the drawing is never cut off.
  if (artistImg) {
    drawImageFill(ctx, artistImg, w, h);
    drawImageCover(ctx, artistImg, w, h);
  }

  // 4. Title at top: "For X by Y with the help of Z"
  const forVal  = (document.getElementById('s3-for').value  || '').trim();
  const byVal   = (document.getElementById('s3-by').value   || '').trim();
  const artist  = document.getElementById('s3-artist-name').textContent || '';
  {
    const parts = [];
    if (forVal) parts.push(`For ${forVal}`);
    else        parts.push(`For —`);
    if (byVal)  parts.push(`by ${byVal}`);
    else        parts.push(`by —`);
    if (artist && artist !== '—') parts.push(`with ${artist}`);
    const titleText = parts.join('  ·  ');

    ctx.save();
    const stripH = 44;
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.fillRect(0, 0, w, stripH);

    // Thin rule at bottom of strip
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(w*0.08, stripH - 6); ctx.lineTo(w*0.92, stripH - 6); ctx.stroke();

    ctx.fillStyle = '#1a1a1a';
    ctx.font = `400 16px 'Syne', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(titleText, w / 2, stripH / 2, w - 24);
    ctx.restore();
  }

  // 5. "The [Keyword]" — tarot card style at bottom
  const keyword = state.keyword || '';
  if (keyword) {
    const label = makeCardLabel(keyword);
    const stripH = 52;
    const stripY = h - stripH;

    // Bottom strip — slightly warm white
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.fillRect(0, stripY, w, stripH);

    // Thin rule lines above text
    ctx.strokeStyle = 'rgba(0,0,0,0.12)';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(w*0.08, stripY + 6); ctx.lineTo(w*0.92, stripY + 6); ctx.stroke();

    // Label text — Syne Bold, the one allowed all-caps
    ctx.fillStyle = '#1a1a1a';
    ctx.font = `700 20px 'Syne', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = '0px';
    ctx.fillText(label, w / 2, stripY + stripH / 2 + 3);

    // Thin rule below
    ctx.beginPath(); ctx.moveTo(w*0.08, h - 8); ctx.lineTo(w*0.92, h - 8); ctx.stroke();
    ctx.restore();
  }
}

function loadCrossOrigin(src) {
  return new Promise((resolve, reject) => {
    if (!src) { resolve(null); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => resolve(img);
    img.onerror = () => resolve(null); // gracefully skip if CORS fails
    img.src = src + (src.includes('?') ? '&' : '?') + '_cors=1'; // cache-bust for CORS headers
  });
}

function buildScreen3() {
  resizeFinalCanvas();

  const w = finalCanvas.width  / devicePixelRatio;
  const h = finalCanvas.height / devicePixelRatio;

  // Re-load both images with crossOrigin so canvas stays exportable
  const scaffoldSrc = document.getElementById('scaffold-img').src || '';

  shareableBlob = null; // reset while loading

  Promise.all([
    loadCrossOrigin(scaffoldSrc),
    replicateResultUrl ? loadCrossOrigin(replicateResultUrl) : Promise.resolve(null),
    document.fonts.ready
  ]).then(([scaffoldImg, artistImg]) => {
    if (!artistImg && !replicateResultUrl) {
      // No AI image — use canvas-based fallback
      const artists = getArtists();
      const artist  = artists[state.selectedArtist];
      const tmp = document.createElement('canvas');
      tmp.width = finalCanvas.width; tmp.height = finalCanvas.height;
      const tctx = tmp.getContext('2d');
      tctx.scale(devicePixelRatio, devicePixelRatio);
      applyArtistStyle(tctx, artist, w, h, state.strokes, state.motifIndex, state.keyword);
      drawCard(finalCtx, w, h, tmp, scaffoldImg);
    } else {
      drawCard(finalCtx, w, h, artistImg, scaffoldImg);
    }
    // Capture blob immediately while canvas is clean
    finalCanvas.toBlob(blob => { shareableBlob = blob; }, 'image/png');
    startReplayAnimation();
  });
}

function startReplayAnimation() {
  if (replayAnimation) cancelAnimationFrame(replayAnimation);

  const rw = replayCanvas.width  / devicePixelRatio;
  const rh = replayCanvas.height / devicePixelRatio;

  const allPoints = [];
  for (const stroke of state.strokes) {
    for (let i = 0; i < stroke.points.length; i++) {
      allPoints.push(stroke.points[i]);
    }
    allPoints.push(null);
  }

  if (allPoints.length === 0) return;

  const drawW = drawCanvas.width  / devicePixelRatio;
  const drawH = drawCanvas.height / devicePixelRatio;
  const sx = rw / drawW;
  const sy = rh / drawH;

  let frame = 0;

  function tick() {
    if (frame === 0) {
      replayCtx.fillStyle = '#f5f2ec';
      replayCtx.fillRect(0, 0, rw, rh);
    }
    if (frame < allPoints.length) {
      const pt = allPoints[frame];
      if (pt === null) {
        // stroke break
      } else {
        const prev = frame > 0 ? allPoints[frame - 1] : null;
        replayCtx.strokeStyle = '#1a1a1a';
        replayCtx.lineWidth = 1.2;
        replayCtx.lineCap = 'round';
        replayCtx.globalAlpha = 0.85;
        if (!prev || prev === null) {
          replayCtx.beginPath();
          replayCtx.moveTo(pt.x * sx, pt.y * sy);
        } else {
          replayCtx.lineTo(pt.x * sx, pt.y * sy);
          replayCtx.stroke();
          replayCtx.beginPath();
          replayCtx.moveTo(pt.x * sx, pt.y * sy);
        }
      }
      frame++;
      replayAnimation = requestAnimationFrame(tick);
    } else {
      setTimeout(() => {
        frame = 0;
        replayCtx.clearRect(0, 0, rw, rh);
        replayAnimation = requestAnimationFrame(tick);
      }, 1400);
    }
  }
  replayAnimation = requestAnimationFrame(tick);
}


/* ── Copy / Save ──────────────────────────────────────── */
document.getElementById('copy-btn').addEventListener('click', async () => {
  const btn = document.getElementById('copy-btn');
  const blob = shareableBlob;
  if (!blob) { btn.textContent = 'Not ready…'; setTimeout(() => btn.textContent = 'Share', 1500); return; }

  const shareText = 'Made with Artifakt — https://artifakt.app';
  try {
    const file = new File([blob], 'reveal.png', { type: 'image/png' });
    // Try sharing with image file (iOS Safari, Android Chrome)
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], text: shareText });
      return;
    }
    // Fallback: share text + URL only (no image)
    if (navigator.share) {
      await navigator.share({ text: shareText });
      return;
    }
    // Desktop: copy image to clipboard
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
    btn.textContent = 'Copied ✓';
    setTimeout(() => btn.textContent = 'Share', 2000);
  } catch (err) {
    if (err.name !== 'AbortError') {
      // Last resort: download
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'reveal.png'; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
  }
});

document.getElementById('restart-btn').addEventListener('click', () => {
  state.keyword = '';
  state.strokes = [];
  state.currentStroke = null;
  state.selectedArtist = 0;
  state.motifIndex = 0;
  state.hasDrawn = false;
  // Clear scaffold image
  const si = document.getElementById('scaffold-img');
  si.classList.remove('ready'); si.src = '';
  document.getElementById('scaffold-loading').classList.remove('show');
  keywordInput.value = '';
  confirmBtn.disabled = true;
  nextBtn.disabled = true;
  canvasHint.style.opacity = '1';
  setS1State('intent');
  transitionTo('screen1');
});

function canvasToBlob(canvas) {
  return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
}

function downloadCanvas(canvas, filename) {
  const a = document.createElement('a');
  a.download = filename;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

/* ══════════════════════════════════════════════════════════
   SCREEN TRANSITIONS
══════════════════════════════════════════════════════════ */
function transitionTo(id) {
  const current = document.querySelector('.screen.active');
  const next    = document.getElementById(id);
  if (!next || current === next) return;

  current.classList.add('exit');
  setTimeout(() => {
    current.classList.remove('active', 'exit');
    next.classList.add('active');
  }, 350);
}

/* ══════════════════════════════════════════════════════════
   RESIZE HANDLER
══════════════════════════════════════════════════════════ */
window.addEventListener('resize', () => {
  if (screen1El.classList.contains('active') &&
      screen1El.classList.contains('state-trace')) {
    resizeDrawCanvas();
  }
});
