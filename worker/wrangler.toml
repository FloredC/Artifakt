name = "artifakt-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

kv_namespaces = [
  { binding = "RATE_LIMIT_KV", id = "REPLACE_WITH_KV_NAMESPACE_ID" }
]

# FAL_API_KEY is a secret — never put it here. After creating the KV
# namespace with:
#   wrangler kv namespace create RATE_LIMIT_KV
# paste the returned id above, then set the key with:
#   wrangler secret put FAL_API_KEY
